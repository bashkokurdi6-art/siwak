<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<title>Admin Rawza PRO</title>

<style>
body{
background:#0f2027;
color:white;
font-family:sans-serif;
padding:20px;
}

.card{
background:rgba(255,255,255,0.08);
padding:15px;
margin:15px 0;
border-radius:15px;
backdrop-filter:blur(10px);
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.row{
display:flex;
gap:10px;
margin-top:10px;
}

img{
width:100px;
height:100px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
margin:3px;
}

.ok{background:#20c997}
.no{background:#dc3545}

.topbar{
margin-bottom:15px;
}

input{
padding:8px;
border-radius:6px;
border:none;
margin:5px;
}

.stats{
margin-bottom:10px;
font-size:14px;
opacity:0.8;
}
</style>
</head>

<body>

<h2>📄 داشبۆردی ڕەوزە</h2>

<div class="stats" id="stats"></div>

<div class="topbar">
<input id="search" placeholder="گەڕان بە ناو / ژمارە..." oninput="load()">

<button onclick="filter='all';load()">هەموو</button>
<button onclick="filter='approved';load()">✔️ قبوڵکراو</button>
<button onclick="filter='rejected';load()">❌ ڕەتکراو</button>
</div>

<div id="list">Loading...</div>

<div style="margin-top:10px;">
<button onclick="prevPage()">⬅️</button>
<span id="pageNum">1</span>
<button onclick="nextPage()">➡️</button>
</div>

<h2>💳 پارەدان</h2>
<div class="card">
<input id="fib" placeholder="FIB">
<input id="fastpay" placeholder="FastPay">
<input id="qicard" placeholder="QiCard">
<button onclick="savePay()">💾 Save</button>
</div>

<script>
const URL="https://igydtqampcfbvyymlmxg.supabase.co";
const KEY="sb_publishable_lOotJfG-w3GgpDpD8446qA_Ba1nKV4k";

let filter="all";
let page=0;
let limit=5;

// 🔥 image
function buildUrl(path,type){
if(!path) return "";
if(path.startsWith("http")) return path;

if(type==="visa"){
return URL+"/storage/v1/object/public/request_uploads/"+path;
}
if(type==="pay"){
return URL+"/storage/v1/object/public/payment-screenshots/"+path;
}
return "";
}

// 🔥 LOAD
async function load(){
let searchVal = search.value.toLowerCase();

let query = URL+"/rest/v1/rawza_requests?select=*&order=id.desc&limit="+limit+"&offset="+(page*limit);

if(filter==="approved") query+="&status=eq.approved";
if(filter==="rejected") query+="&status=eq.rejected";

let res = await fetch(query,{
headers:{apikey:KEY,Authorization:"Bearer "+KEY}
});

let data = await res.json();

// 🔥 stats
let all = data.length;
let approved = data.filter(x=>x.status==="approved").length;
let rejected = data.filter(x=>x.status==="rejected").length;

stats.innerHTML = `هەموو: ${all} | ✔️ ${approved} | ❌ ${rejected}`;

let html="";

data
.filter(o=> o.name.toLowerCase().includes(searchVal) || o.phone.includes(searchVal))
.forEach(o=>{

let visa = buildUrl(o.visa_image,"visa");
let pay  = buildUrl(o.payment_image,"pay");

html+=`
<div class="card">
👤 ${o.name}<br>
📞 ${o.phone}<br>
📅 ${o.date} | ${o.time}<br>
👥 ${o.gender}<br>

<div class="row">
${visa ? `<img src="${visa}" onclick="window.open('${visa}')">` : ""}
${pay ? `<img src="${pay}" onclick="window.open('${pay}')">` : ""}
</div>

<div>حاڵەت: ${o.status || "چاوەڕوان"}</div>

<button class="ok" onclick="setStatus(${o.id},'approved')">✔️</button>
<button class="no" onclick="setStatus(${o.id},'rejected')">❌</button>
</div>
`;
});

list.innerHTML = html || "هیچ نەدۆزرایەوە";
pageNum.innerText = page+1;
}

// 🔥 STATUS
async function setStatus(id,s){
await fetch(URL+"/rest/v1/rawza_requests?id=eq."+id,{
method:"PATCH",
headers:{
"Content-Type":"application/json",
apikey:KEY,
Authorization:"Bearer "+KEY
},
body:JSON.stringify({status:s})
});
load();
}

// 🔥 pagination
function nextPage(){page++;load();}
function prevPage(){ if(page>0){page--;load();} }

// 🔥 payment
fetch(URL+"/rest/v1/rawza_settings?id=eq.1",{
headers:{apikey:KEY,Authorization:"Bearer "+KEY}
})
.then(r=>r.json())
.then(d=>{
let s=d[0]||{};
fib.value=s.fib||"";
fastpay.value=s.fastpay||"";
qicard.value=s.qicard||"";
});

function savePay(){
fetch(URL+"/rest/v1/rawza_settings?id=eq.1",{
method:"PATCH",
headers:{
"Content-Type":"application/json",
apikey:KEY,
Authorization:"Bearer "+KEY
},
body:JSON.stringify({
fib:fib.value,
fastpay:fastpay.value,
qicard:qicard.value
})
})
.then(()=>alert("✔️ Saved"));
}

// 🔥 start
load();
</script>

</body>
</html>
