<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<title>Admin Visa</title>

<style>
body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
font-family:sans-serif;
margin:0;
padding:20px;
}

.wrap{
max-width:500px;
margin:auto;
}

/* card */
.card{
background:rgba(255,255,255,0.08);
padding:15px;
margin:15px 0;
border-radius:15px;
backdrop-filter:blur(12px);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* images */
img{
width:100%;
max-height:180px;
object-fit:cover;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

/* buttons */
.actions{
display:flex;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.approve{
background:linear-gradient(90deg,#20c997,#198754);
}

.reject{
background:linear-gradient(90deg,#ff4d4d,#cc0000);
}

/* status */
.status{
margin-top:10px;
font-size:13px;
opacity:0.8;
}

/* popup image */
#viewer{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

#viewer img{
max-width:90%;
max-height:90%;
}
</style>
</head>

<body>

<div class="wrap">
<h2>📄 داواکارییەکان</h2>
<div id="list">Loading...</div>
</div>

<div id="viewer" onclick="this.style.display='none'">
<img id="bigImg">
</div>

<script>
const URL="https://igydtqampcfbvyymlmxg.supabase.co";
const KEY="sb_publishable_lOotJfG-w3GgpDpD8446qA_Ba1nKV4k";

// load data
async function load(){
let res=await fetch(URL+"/rest/v1/visa_requests?select=*&order=id.desc",{
headers:{apikey:KEY,Authorization:"Bearer "+KEY}
});

let data=await res.json();
let html="";

data.forEach(o=>{
html+=`
<div class="card">

👤 <b>${o.name}</b><br>
📞 ${o.phone}<br>
📄 ${o.visa_type}<br>
💰 ${o.price}<br>

<img src="${o.passport_image}" onclick="showImg('${o.passport_image}')">
<img src="${o.payment_image}" onclick="showImg('${o.payment_image}')">

<div class="actions">
<button class="approve" onclick="setStatus(${o.id},'approved')">✔️ Approve</button>
<button class="reject" onclick="setStatus(${o.id},'rejected')">❌ Reject</button>
</div>

<div class="status">
Status: ${o.status || "pending"}
</div>

</div>`;
});

document.getElementById("list").innerHTML=html;
}

// 🔥 fix buttons
async function setStatus(id,status){

let res=await fetch(URL+"/rest/v1/visa_requests?id=eq."+id,{
method:"PATCH",
headers:{
"Content-Type":"application/json",
apikey:KEY,
Authorization:"Bearer "+KEY
},
body:JSON.stringify({status:status})
});

if(res.ok){
load();
}else{
alert("هەڵە لە گۆڕین");
}
}

// 🖼 preview big image
function showImg(src){
document.getElementById("bigImg").src=src;
document.getElementById("viewer").style.display="flex";
}

load();
</script>

</body>
</html>
