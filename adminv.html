<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<title>Admin Visa</title>

<style>
body{background:#111;color:white;font-family:sans-serif;padding:20px}
.card{background:#1c1c1c;padding:15px;margin:10px 0;border-radius:10px}
img{width:100%;margin-top:10px;border-radius:10px}
button{padding:8px;margin:5px;border:none;border-radius:6px}
.green{background:#20c997}
.red{background:#dc3545}
</style>
</head>

<body>

<h2>📄 داواکاریەکان</h2>
<div id="list">Loading...</div>

<script>
const URL="https://igydtqampcfbvyymlmxg.supabase.co";
const KEY="sb_publishable_lOotJfG-w3GgpDpD8446qA_Ba1nKV4k";

async function load(){
let res=await fetch(URL+"/rest/v1/visa_requests?select=*&order=id.desc",{
headers:{apikey:KEY,Authorization:"Bearer "+KEY}
});
let data=await res.json();

let html="";

data.forEach(o=>{
html+=`
<div class="card">
👤 ${o.name}<br>
📞 ${o.phone}<br>
📄 ${o.visa_type}<br>
💰 ${o.price}<br>

<img src="${o.passport_image}">
<img src="${o.payment_image}">

<button class="green" onclick="setStatus(${o.id},'approved')">✔️</button>
<button class="red" onclick="setStatus(${o.id},'rejected')">❌</button>
</div>`;
});

list.innerHTML=html;
}

async function setStatus(id,s){
await fetch(URL+"/rest/v1/visa_requests?id=eq."+id,{
method:"PATCH",
headers:{
"Content-Type":"application/json",
apikey:KEY,
Authorization:"Bearer "+KEY
},
body:JSON.stringify({status:s})
});
load();
}

load();
</script>
</body>
</html>
