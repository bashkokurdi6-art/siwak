<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rawza</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:url("bg.jpg") center/cover fixed;
color:white;
}

.overlay{
background:rgba(0,0,0,0.7);
min-height:100vh;
padding:20px;
}

.wrap{
max-width:420px;
margin:auto;
}

.hero{
text-align:center;
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:20px;
margin-bottom:20px;
backdrop-filter:blur(10px);
}

.hero h3{
margin:0;
font-size:16px;
line-height:1.8;
}

.card{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:15px;
margin-bottom:15px;
backdrop-filter:blur(10px);
}

input,textarea{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.2);
color:white;
}

.row{
display:flex;
gap:10px;
}

.gender{
display:flex;
gap:10px;
margin-top:10px;
}

.gender div{
flex:1;
padding:10px;
text-align:center;
background:#333;
border-radius:10px;
cursor:pointer;
}

.active{background:#20c997}

.preview{
width:100%;
margin-top:10px;
border-radius:10px;
display:none;
}

.pay{
display:flex;
gap:10px;
margin-top:10px;
}

.pay div{
flex:1;
padding:10px;
text-align:center;
background:#333;
border-radius:10px;
cursor:pointer;
}

button{
width:100%;
padding:14px;
background:linear-gradient(90deg,#20c997,#198754);
border:none;
border-radius:12px;
margin-top:15px;
}

#popup{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

#popup div{
background:white;
color:black;
padding:20px;
border-radius:15px;
text-align:center;
}
</style>
</head>

<body>

<div class="overlay">
<div class="wrap">

<div class="hero">
<h3>
ما بينَ بيتي ومِنْبَري روضةٌ مِنْ رياضِ الجنةِ<br>
ومِنْبَري على حوضِي<br><br>
خلاصة حكم المحدث : صحيح
</h3>
</div>

<form id="form" class="card">

<label>ناوی سیانی</label>
<input name="name" required>

<label>ژمارە</label>
<input name="phone" required>

<div class="row">
<input type="date" id="date" required>
<input type="time" id="time" required>
</div>

<label>جۆر</label>
<div class="gender">
<div onclick="setGender(this,'male')">👨 نێر</div>
<div onclick="setGender(this,'female')">👩 مێ</div>
</div>

<label>📸 وێنەی ڤیزە</label>
<input type="file" id="visa" required>
<img id="vPrev" class="preview">

<label>💳 پارەدان</label>
<div class="pay">
<div onclick="setPay(this,'FIB')">FIB</div>
<div onclick="setPay(this,'FastPay')">FastPay</div>
<div onclick="setPay(this,'QiCard')">QiCard</div>
</div>

<div id="acc" style="margin-top:10px;font-size:13px;"></div>

<input type="file" id="payimg" required>
<img id="pPrev" class="preview">

<textarea name="note" placeholder="تێبینی"></textarea>

<button>ناردن</button>

</form>

</div>
</div>

<div id="popup"><div id="msg"></div></div>

<script>
const URL="https://igydtqampcfbvyymlmxg.supabase.co";
const KEY="sb_publishable_lOotJfG-w3GgpDpD8446qA_Ba1nKV4k";

let gender="",pay="";
let settings={};

function pop(t){
msg.innerText=t;
popup.style.display="flex";
setTimeout(()=>popup.style.display="none",2500);
}

// 🔥 load payment settings
fetch(URL+"/rest/v1/rawza_settings?id=eq.1",{
headers:{apikey:KEY,Authorization:"Bearer "+KEY}
})
.then(r=>r.json())
.then(d=>{
settings=d[0]||{};
});

// gender
function setGender(el,g){
document.querySelectorAll(".gender div").forEach(x=>x.classList.remove("active"));
el.classList.add("active");
gender=g;
}

// payment
function setPay(el,p){
document.querySelectorAll(".pay div").forEach(x=>x.classList.remove("active"));
el.classList.add("active");
pay=p;

acc.innerText="ژمارە: "+(
p=="FIB"?settings.fib:
p=="FastPay"?settings.fastpay:
settings.qicard
);
}

// preview
visa.onchange=e=>{
vPrev.src=URL.createObjectURL(e.target.files[0]);
vPrev.style.display="block";
};

payimg.onchange=e=>{
pPrev.src=URL.createObjectURL(e.target.files[0]);
pPrev.style.display="block";
};

// submit
form.onsubmit=async e=>{
e.preventDefault();

let v=visa.files[0];
let p=payimg.files[0];

if(!v||!p||!gender||!pay){
pop("هەموو خانەکان پڕ بکە");
return;
}

let vn=Date.now()+"_v_"+v.name;
let pn=Date.now()+"_p_"+p.name;

// ✅ upload visa
await fetch(URL+"/storage/v1/object/request_uploads/"+vn,{
method:"POST",
headers:{apikey:KEY,Authorization:"Bearer "+KEY},
body:v
});

// ✅ upload payment
await fetch(URL+"/storage/v1/object/payment-screenshots/"+pn,{
method:"POST",
headers:{apikey:KEY,Authorization:"Bearer "+KEY},
body:p
});

// ✅ save DB (فایل ناو تەنها)
await fetch(URL+"/rest/v1/rawza_requests",{
method:"POST",
headers:{
"Content-Type":"application/json",
apikey:KEY,
Authorization:"Bearer "+KEY
},
body:JSON.stringify({
name:form.name.value,
phone:form.phone.value,
date:date.value,
time:time.value,
gender:gender,
visa_image: vn,
payment_image: pn,
payment_method:pay,
note:form.note.value
})
});

pop("داواکاریەکەت بەسەرکەوتووی نێردرا ❤️");
form.reset();
};
</script>

</body>
</html>
