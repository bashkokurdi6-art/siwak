<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIWAK ADMIN</title>

<style>
body{
font-family:sans-serif;
background:#111;
color:white;
margin:0;
padding:20px;
}
h2{margin-bottom:20px}

.card{
background:#1c1c1c;
padding:15px;
margin:12px 0;
border-radius:12px;
border-left:5px solid #20c997;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-weight:bold;
}

.badge{
background:#20c997;
padding:4px 8px;
border-radius:6px;
font-size:12px;
}

.phone{color:#0dcaf0}
.note{opacity:0.8;margin-top:5px}

.refresh{
background:#20c997;
padding:10px;
border-radius:10px;
cursor:pointer;
display:inline-block;
margin-bottom:15px;
}

.empty{
opacity:0.6;
text-align:center;
margin-top:40px;
}
</style>
</head>

<body>

<h2>📊 داواکارییەکان</h2>

<div class="refresh" onclick="load()">🔄 نوێکردنەوە</div>

<div id="list">Loading...</div>

<script>

const API="https://igydtqampcfbvyymlmxg.supabase.co/rest/v1/orders?select=*";
const KEY="sb_publishable_lOotJfG-w3GgpDpD8446qA_Ba1nKV4k";

function load(){
document.getElementById("list").innerHTML="Loading...";

fetch(API,{
headers:{
"apikey":KEY,
"Authorization":"Bearer "+KEY
}
})
.then(res=>res.json())
.then(data=>{

if(data.length===0){
document.getElementById("list").innerHTML="<div class='empty'>هیچ داواکارییەک نیە</div>";
return;
}

let html="";

data.reverse().forEach(o=>{
html+=`
<div class="card">
<div class="top">
<span>🏨 ${o.hotel}</span>
<span class="badge">New</span>
</div>

<div>👤 ${o.name}</div>
<div class="phone">📞 ${o.phone}</div>

<div class="note">📝 ${o.note || "—"}</div>
</div>
`;
});

document.getElementById("list").innerHTML=html;

})
.catch(()=>{
document.getElementById("list").innerHTML="<div class='empty'>❌ هەڵەیەک ڕوویدا</div>";
});

}

load();

</script>

</body>
</html>
