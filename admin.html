<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN</title>

<style>
body{font-family:sans-serif;background:#111;color:white;padding:20px}
input{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:none}
button{padding:8px;margin:5px;border:none;border-radius:6px;cursor:pointer}
.card{background:#1c1c1c;padding:15px;margin:10px 0;border-radius:10px}
.save{background:#20c997}
.delete{background:#dc3545}
.add{background:#0d6efd}
</style>
</head>

<body>

<h2>🏨 Hotels Admin</h2>

<div class="card">
<h3>➕ زیادکردن</h3>
<input id="name" placeholder="ناو">
<input id="rating" placeholder="⭐">
<input id="price" placeholder="💰">
<input id="loc" placeholder="📍">
<input id="city" placeholder="Makkah / Madina">
<button class="add" onclick="addHotel()">زیادکردن</button>
</div>

<div id="list">Loading...</div>

<!-- 💳 PAYMENT -->
<div class="card">
<h3>💳 پارەدان</h3>
<input id="fib" placeholder="FIB">
<input id="fastpay" placeholder="FastPay">
<input id="qicard" placeholder="QiCard">
<button class="save" onclick="savePay()">💾 Save</button>
</div>

<!-- 📊 ORDERS -->
<h2>📊 داواکارییەکان</h2>
<div id="ordersList">Loading...</div>

<script>

const API="https://igydtqampcfbvyymlmxg.supabase.co/rest/v1/hotels";
const KEY="sb_publishable_lOotJfG-w3GgpDpD8446qA_Ba1nKV4k";

// ================= HOTELS =================
function load(){
fetch(API+"?select=*",{
headers:{ "apikey":KEY, "Authorization":"Bearer "+KEY }
})
.then(res=>res.json())
.then(data=>{
let html="";
data.forEach(h=>{
html+=`
<div class="card">
<input value="${h.name}" id="name${h.id}">
<input value="${h.rating}" id="rating${h.id}">
<input value="${h.price}" id="price${h.id}">
<input value="${h.loc}" id="loc${h.id}">
<input value="${h.city}" id="city${h.id}">
<button class="save" onclick="update(${h.id})">💾 Save</button>
<button class="delete" onclick="del(${h.id})">🗑 Delete</button>
</div>`;
});
document.getElementById("list").innerHTML=html;
});
}

function update(id){
fetch(API+"?id=eq."+id,{
method:"PATCH",
headers:{ "Content-Type":"application/json","apikey":KEY,"Authorization":"Bearer "+KEY },
body:JSON.stringify({
name:document.getElementById("name"+id).value,
rating:document.getElementById("rating"+id).value,
price:document.getElementById("price"+id).value,
loc:document.getElementById("loc"+id).value,
city:document.getElementById("city"+id).value
})
}).then(()=>load());
}

function del(id){
fetch(API+"?id=eq."+id,{
method:"DELETE",
headers:{ "apikey":KEY,"Authorization":"Bearer "+KEY }
}).then(()=>load());
}

function addHotel(){
fetch(API,{
method:"POST",
headers:{ "Content-Type":"application/json","apikey":KEY,"Authorization":"Bearer "+KEY },
body:JSON.stringify({
name:document.getElementById("name").value,
rating:document.getElementById("rating").value,
price:document.getElementById("price").value,
loc:document.getElementById("loc").value,
city:document.getElementById("city").value
})
}).then(()=>load());
}

// ================= PAYMENT =================
function loadPay(){
fetch("https://igydtqampcfbvyymlmxg.supabase.co/rest/v1/payments?id=eq.1",{
headers:{ "apikey":KEY,"Authorization":"Bearer "+KEY }
})
.then(res=>res.json())
.then(d=>{
document.getElementById("fib").value=d[0].fib;
document.getElementById("fastpay").value=d[0].fastpay;
document.getElementById("qicard").value=d[0].qicard;
});
}

function savePay(){
fetch("https://igydtqampcfbvyymlmxg.supabase.co/rest/v1/payments?id=eq.1",{
method:"PATCH",
headers:{ "Content-Type":"application/json","apikey":KEY,"Authorization":"Bearer "+KEY },
body:JSON.stringify({
fib:document.getElementById("fib").value,
fastpay:document.getElementById("fastpay").value,
qicard:document.getElementById("qicard").value
})
}).then(()=>alert("Saved ✔️"));
}

// ================= ORDERS =================
function loadOrders(){
fetch("https://igydtqampcfbvyymlmxg.supabase.co/rest/v1/orders?select=*",{
headers:{ "apikey":KEY,"Authorization":"Bearer "+KEY }
})
.then(res=>res.json())
.then(data=>{
let html="";

if(data.length===0){
html="هیچ داواکارییەک نیە";
}else{

data.reverse().forEach(o=>{

let color = o.status==="approved" ? "#198754" :
            o.status==="rejected" ? "#dc3545" : "#ffc107";

html+=`
<div class="card" style="border-left:5px solid ${color}">

<b>🏨 ${o.hotel}</b><br>
👤 ${o.name}<br>
📞 ${o.phone}<br>
📝 ${o.note || "-"}

<br>
Status: <b style="color:${color}">${o.status || "pending"}</b>

<div style="margin-top:10px">
<button class="save" onclick="updateStatus(${o.id},'approved')">✔️ Accept</button>
<button class="delete" onclick="updateStatus(${o.id},'rejected')">❌ Reject</button>
<button onclick="delOrder(${o.id})">🗑 Delete</button>
</div>

${o.image ? `<img src="${o.image}" style="width:100%;margin-top:10px;border-radius:10px;">` : ""}

</div>
`;
});

}

document.getElementById("ordersList").innerHTML=html;
});
}

function updateStatus(id,status){
fetch("https://igydtqampcfbvyymlmxg.supabase.co/rest/v1/orders?id=eq."+id,{
method:"PATCH",
headers:{
"Content-Type":"application/json",
"apikey":KEY,
"Authorization":"Bearer "+KEY
},
body:JSON.stringify({status:status})
}).then(()=>loadOrders());
}

function delOrder(id){
fetch("https://igydtqampcfbvyymlmxg.supabase.co/rest/v1/orders?id=eq."+id,{
method:"DELETE",
headers:{
"apikey":KEY,
"Authorization":"Bearer "+KEY
}
}).then(()=>loadOrders());
}

// ================= START =================
load();
loadPay();
loadOrders();

</script>

</body>
</html>
