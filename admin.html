<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN</title>

<style>
body{font-family:sans-serif;background:#111;color:white;padding:20px}
input{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:none}
button{padding:8px;margin:5px;border:none;border-radius:6px;cursor:pointer}
.card{background:#1c1c1c;padding:15px;margin:10px 0;border-radius:10px}
.save{background:#20c997}
.delete{background:#dc3545}
.add{background:#0d6efd}
</style>
</head>

<body>

<h2>🏨 Hotels Admin</h2>

<div class="card">
<h3>➕ زیادکردن</h3>
<input id="name" placeholder="ناو">
<input id="rating" placeholder="⭐">
<input id="price" placeholder="💰">
<input id="loc" placeholder="📍">
<input id="city" placeholder="Makkah / Madina">
<button class="add" onclick="addHotel()">زیادکردن</button>
</div>

<div id="list">Loading...</div>

<script>

const API="https://igydtqampcfbvyymlmxg.supabase.co/rest/v1/hotels";
const KEY="sb_publishable_lOotJfG-w3GgpDpD8446qA_Ba1nKV4k";

function load(){
fetch(API+"?select=*",{
headers:{
"apikey":KEY,
"Authorization":"Bearer "+KEY
}
})
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(h=>{
html+=`
<div class="card">

<input value="${h.name}" id="name${h.id}">
<input value="${h.rating}" id="rating${h.id}">
<input value="${h.price}" id="price${h.id}">
<input value="${h.loc}" id="loc${h.id}">
<input value="${h.city}" id="city${h.id}">

<button class="save" onclick="update(${h.id})">💾 Save</button>
<button class="delete" onclick="del(${h.id})">🗑 Delete</button>

</div>
`;
});

document.getElementById("list").innerHTML=html;

});
}

function update(id){
fetch(API+"?id=eq."+id,{
method:"PATCH",
headers:{
"Content-Type":"application/json",
"apikey":KEY,
"Authorization":"Bearer "+KEY
},
body:JSON.stringify({
name:document.getElementById("name"+id).value,
rating:document.getElementById("rating"+id).value,
price:document.getElementById("price"+id).value,
loc:document.getElementById("loc"+id).value,
city:document.getElementById("city"+id).value
})
}).then(()=>load());
}

function del(id){
fetch(API+"?id=eq."+id,{
method:"DELETE",
headers:{
"apikey":KEY,
"Authorization":"Bearer "+KEY
}
}).then(()=>load());
}

function addHotel(){
fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json",
"apikey":KEY,
"Authorization":"Bearer "+KEY
},
body:JSON.stringify({
name:document.getElementById("name").value,
rating:document.getElementById("rating").value,
price:document.getElementById("price").value,
loc:document.getElementById("loc").value,
city:document.getElementById("city").value
})
}).then(()=>load());
}

load();

</script>

</body>
</html>
