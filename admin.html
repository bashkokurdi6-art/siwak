<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADMIN PRO</title>

<style>
body{font-family:sans-serif;background:#111;color:white;padding:20px}
.card{background:#222;padding:15px;margin:10px 0;border-radius:10px}
input{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:none}
button{padding:12px;width:100%;background:#20c997;color:white;border:none;border-radius:10px}
</style>
</head>

<body>

<h2>🏨 Makkah</h2>
<div id="makkah"></div>

<h2>🕌 Madina</h2>
<div id="madina"></div>

<h2>💳 Payments</h2>
<div class="card">
<input id="fib">
<input id="fast">
<input id="qi">
</div>

<button onclick="save()">💾 Save</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 داتاکانی خۆت دابنێ */
const firebaseConfig = {
apiKey: "XXXX",
authDomain: "XXXX",
projectId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let data = {
makkah:Array(7).fill({name:"Hotel",rating:4.5,price:100}),
madina:Array(7).fill({name:"Hotel",rating:4.5,price:100}),
payments:{FIB:"0750",FastPay:"0770",QiCard:"0780"}
};

function render(section,id){
let html="";
data[section].forEach((h,i)=>{
html+=`
<div class="card">
<input value="${h.name}" onchange="data.${section}[${i}].name=this.value">
<input value="${h.rating}" onchange="data.${section}[${i}].rating=this.value">
<input value="${h.price}" onchange="data.${section}[${i}].price=this.value">
</div>`;
});
document.getElementById(id).innerHTML=html;
}

render("makkah","makkah");
render("madina","madina");

window.save = async ()=>{
data.payments.FIB = document.getElementById("fib").value;
data.payments.FastPay = document.getElementById("fast").value;
data.payments.QiCard = document.getElementById("qi").value;

await setDoc(doc(db,"siwak","data"),data);

alert("Saved ✔️");
};

</script>

</body>
</html>
