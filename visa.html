<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visa</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* container */
.wrap{
max-width:420px;
margin:auto;
padding:20px;
}

/* header */
.header{
text-align:center;
margin-bottom:20px;
}

.header img{
width:120px;
margin-bottom:10px;
}

.header h2{
margin:0;
font-size:22px;
}

/* card */
.card{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:15px;
margin-bottom:15px;
backdrop-filter:blur(12px);
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

/* inputs */
input,textarea,select{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.15);
color:white;
font-size:14px;
}

/* labels */
label{
font-size:13px;
opacity:0.8;
}

/* pay buttons */
.pay{
display:flex;
gap:10px;
margin-top:10px;
}

.pay div{
flex:1;
padding:12px;
text-align:center;
border-radius:10px;
background:#333;
cursor:pointer;
transition:0.3s;
}

.pay div:hover{
background:#555;
}

.pay .active{
background:#20c997;
}

/* images preview */
.preview{
width:100%;
margin-top:10px;
border-radius:10px;
display:none;
}

/* button */
button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
font-size:16px;
background:linear-gradient(90deg,#20c997,#198754);
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
opacity:0.8;
}

/* popup */
#popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

#popup div{
background:white;
color:black;
padding:25px;
border-radius:15px;
max-width:90%;
text-align:center;
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<img src="bg.jpg">
<h2>📄 داواکاری ڤیزە</h2>
</div>

<div class="card">
<label>جۆری ڤیزە</label>
<select id="type">
<option value="3m">سێ مانگی</option>
<option value="1y">١ ساڵی</option>
</select>

<div id="price" style="margin-top:10px;font-size:14px;"></div>
</div>

<form id="form" class="card">

<label>ناو</label>
<input name="name" required>

<label>ژمارە</label>
<input name="phone" required>

<label>📸 پاسپۆرت</label>
<input type="file" id="pass" required>
<img id="pPrev" class="preview">

<label>تێبینی</label>
<textarea name="note"></textarea>

<label>💳 پارەدان</label>
<div class="pay">
<div onclick="setPay(this,'FIB')">FIB</div>
<div onclick="setPay(this,'FastPay')">FastPay</div>
<div onclick="setPay(this,'QiCard')">QiCard</div>
</div>

<div id="acc" style="margin-top:10px;font-size:13px;"></div>

<input type="file" id="payimg" required>
<img id="payPrev" class="preview">

<button>ناردن</button>

</form>

</div>

<div id="popup"><div id="msg"></div></div>

<script>
const URL="https://igydtqampcfbvyymlmxg.supabase.co";
const KEY="sb_publishable_lOotJfG-w3GgpDpD8446qA_Ba1nKV4k";

let settings={},method="";

function pop(t){
msg.innerText=t;
popup.style.display="flex";
setTimeout(()=>popup.style.display="none",2500);
}

fetch(URL+"/rest/v1/visa_settings?id=eq.1",{headers:{apikey:KEY,Authorization:"Bearer "+KEY}})
.then(r=>r.json())
.then(d=>{
settings=d[0]||{};
updatePrice();
});

function updatePrice(){
price.innerText="💰 "+(type.value=="3m"?settings.price_3m:settings.price_1y);
}
type.onchange=updatePrice;

function setPay(el,m){
document.querySelectorAll(".pay div").forEach(x=>x.classList.remove("active"));
el.classList.add("active");
method=m;

acc.innerText="ژمارە: "+(
m=="FIB"?settings.fib:
m=="FastPay"?settings.fastpay:
settings.qicard
);
}

pass.onchange=e=>{
pPrev.src=URL.createObjectURL(e.target.files[0]);
pPrev.style.display="block";
};

payimg.onchange=e=>{
payPrev.src=URL.createObjectURL(e.target.files[0]);
payPrev.style.display="block";
};

form.onsubmit=async e=>{
e.preventDefault();

let p=pass.files[0];
let py=payimg.files[0];

if(!p||!py||!method){
pop("هەموو خانەکان پڕ بکە");
return;
}

let pn=Date.now()+"_p_"+p.name;
let pyn=Date.now()+"_pay_"+py.name;

await fetch(URL+"/storage/v1/object/visa/"+pn,{
method:"POST",
headers:{apikey:KEY,Authorization:"Bearer "+KEY},
body:p
});

await fetch(URL+"/storage/v1/object/visa/"+pyn,{
method:"POST",
headers:{apikey:KEY,Authorization:"Bearer "+KEY},
body:py
});

await fetch(URL+"/rest/v1/visa_requests",{
method:"POST",
headers:{
"Content-Type":"application/json",
apikey:KEY,
Authorization:"Bearer "+KEY
},
body:JSON.stringify({
name:form.name.value,
phone:form.phone.value,
note:form.note.value,
passport_image:URL+"/storage/v1/object/public/visa/"+pn,
payment_image:URL+"/storage/v1/object/public/visa/"+pyn,
payment_method:method,
visa_type:type.value,
price:price.innerText
})
});

pop("✔️ نێردرا");
form.reset();
};
</script>

</body>
</html>
