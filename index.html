<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIWAK</title>

<style>
*{box-sizing:border-box}
body{
margin:0;font-family:sans-serif;
background:url("bg.jpg") center/cover fixed;
color:white;padding-top:200px;
}
body::before{
content:"";position:fixed;width:100%;height:100%;
background:rgba(0,0,0,0.5);z-index:-1;
}
.section{margin:15px;cursor:pointer;position:relative}
.section img{width:100%;height:200px;object-fit:cover;border-radius:20px}
.title{
position:absolute;bottom:10px;left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
padding:10px 20px;border-radius:12px;
}
.hotels{display:none;margin:10px}
.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:15px;margin:12px 0;border-radius:15px;
cursor:pointer;transition:0.3s;
}
.card:hover{transform:scale(1.03)}
.form{display:none;background:rgba(255,255,255,0.15);
padding:18px;margin:15px;border-radius:20px}
input,textarea{
width:100%;padding:12px;margin:6px 0;border-radius:12px;
background:rgba(255,255,255,0.2);color:white;
border:1px solid rgba(255,255,255,0.3);
}
.payRow{display:flex;gap:10px;margin:10px 0}
.payCard{flex:1;padding:12px;border-radius:12px;background:rgba(255,255,255,0.2);cursor:pointer;text-align:center}
.payCard.active{background:#20c997}
.accountBox{display:none;background:rgba(0,0,0,0.4);padding:10px;border-radius:10px}
.uploadBox{border:2px dashed rgba(255,255,255,0.4);padding:15px;border-radius:12px;text-align:center}
#preview{width:100%;display:none;margin-top:10px;border-radius:10px}
.btn{background:linear-gradient(90deg,#198754,#20c997);padding:12px;border-radius:12px;cursor:pointer;text-align:center}
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center}
.popupBox{background:white;color:black;padding:25px;border-radius:20px;text-align:center}
.loader{border:4px solid #ccc;border-top:4px solid #20c997;border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<div class="section" onclick="toggle('makkah')">
<img src="kaaba.jpg">
<div class="title">هوتێلەکانی مککە</div>
</div>
<div id="makkah" class="hotels"></div>

<div class="section" onclick="toggle('madina')">
<img src="madina.jpg">
<div class="title">هوتێلەکانی مەدینە</div>
</div>
<div id="madina" class="hotels"></div>

<form id="formBox" class="form">
<input type="hidden" id="hotelInput">

<input name="name" placeholder="ناوی سیانی" required>
<input name="phone" placeholder="ژمارەی مۆبایل" required>

<div class="payRow">
<div class="payCard" onclick="selectPay(this,'FIB')">FIB</div>
<div class="payCard" onclick="selectPay(this,'FastPay')">FastPay</div>
<div class="payCard" onclick="selectPay(this,'QiCard')">QiCard</div>
</div>

<div id="accountBox" class="accountBox"></div>

<div class="uploadBox">
📸 وێنەی پارەناردن
<input type="file" id="fileInput" required onchange="previewImg(event)">
</div>

<img id="preview">

<textarea name="note" placeholder="تێبینی"></textarea>

<button class="btn" type="submit">✔️ ناردن</button>
</form>

<div id="popup" class="popup">
<div class="popupBox" id="popupContent"></div>
</div>

<script>

const API_HOTELS="https://igydtqampcfbvyymlmxg.supabase.co/rest/v1/hotels?select=*";
const KEY="sb_publishable_lOotJfG-w3GgpDpD8446qA_Ba1nKV4k";

// 🔥 hotels
function loadHotels(){
fetch(API_HOTELS,{
headers:{
"apikey":KEY,
"Authorization":"Bearer "+KEY
}
})
.then(res=>res.json())
.then(data=>{
render("makkah","Makkah",data);
render("madina","Madina",data);
});
}

function render(id,city,data){
let html="";
data.filter(h=>h.city===city).forEach(h=>{
html+=`<div class="card" onclick="openForm('${h.name}')">
<div>🏨 ${h.name}</div>
<div>⭐ ${h.rating} | 📍 ${h.loc}</div>
<div style="color:#20c997">💰 $${h.price}</div>
</div>`;
});
document.getElementById(id).innerHTML=html;
}

// 🔥 payments
let acc={};

function loadPayments(){
fetch("https://igydtqampcfbvyymlmxg.supabase.co/rest/v1/payments?id=eq.1",{
headers:{
"apikey":KEY,
"Authorization":"Bearer "+KEY
}
})
.then(res=>res.json())
.then(data=>{
acc={
FIB:data[0].fib,
FastPay:data[0].fastpay,
QiCard:data[0].qicard
};
});
}

// 🔥 start
loadHotels();
loadPayments();


// UI
function toggle(id){
["makkah","madina"].forEach(i=>{
document.getElementById(i).style.display="none";
});
document.getElementById(id).style.display="block";
}

function openForm(name){
document.getElementById("formBox").style.display="block";
document.getElementById("hotelInput").value=name;
window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
}

function selectPay(el,method){
document.querySelectorAll(".payCard").forEach(c=>c.classList.remove("active"));
el.classList.add("active");

let box=document.getElementById("accountBox");
box.style.display="block";
box.innerText="ژمارە: "+(acc[method] || "...");
}

function previewImg(e){
let img=document.getElementById("preview");
img.src=URL.createObjectURL(e.target.files[0]);
img.style.display="block";
}

// 🔥 submit
document.getElementById("formBox").addEventListener("submit",function(e){
e.preventDefault();

if(!document.querySelector(".payCard.active")){
alert("تکایە جۆری پارەدان هەڵبژێرە");
return;
}

showPopup("<div class='loader'></div><p>چاوەڕێ بکە...</p>");

// Formspree
fetch("https://formspree.io/f/mqedjear",{method:"POST"});

// Supabase
fetch("https://igydtqampcfbvyymlmxg.supabase.co/rest/v1/orders",{
method:"POST",
headers:{
"Content-Type":"application/json",
"apikey":KEY,
"Authorization":"Bearer "+KEY
},
body:JSON.stringify({
hotel:document.getElementById("hotelInput").value,
name:document.querySelector("[name='name']").value,
phone:document.querySelector("[name='phone']").value,
note:document.querySelector("[name='note']").value
})
})
.then(()=>{
showPopup("✔️ نێردرا");
setTimeout(closePopup,2000);
})
.catch(()=>{
showPopup("❌ هەڵە");
});

});

function showPopup(html){
document.getElementById("popupContent").innerHTML=html;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>
</body>
</html>
