<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سیواك</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hijri-date/lib/safe.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Cairo',sans-serif;
background:linear-gradient(#031d1a,#062f2a);
color:#fff;
display:flex;
justify-content:center;
}

.app{width:100%;max-width:420px}

/* HEADER */
.header{text-align:center;padding:20px}
.header h1{font-size:32px;font-weight:700}

/* HERO */
.hero{
height:220px;
margin:10px;
border-radius:20px;
background:
linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.7)),
url('https://images.unsplash.com/photo-1591608516733-0e0c6c1c7e1d');
background-size:cover;
display:flex;
align-items:flex-end;
padding:15px;
}

/* HERO TEXT */
.hero-text{
width:100%;
background:rgba(0,0,0,.4);
padding:10px;
border-radius:10px;
text-align:center;
}

/* TIME */
.time{text-align:center;margin:10px 0;opacity:.8}

/* CARD */
.card{
margin:15px;
padding:20px;
border-radius:18px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
}

/* INPUT */
input,select,textarea{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.08);
color:#fff;
}

/* BUTTON */
button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#1fa37a,#18c29c);
font-weight:bold;
}

/* STATS */
.stats{
display:flex;
gap:10px;
}
.stat{
flex:1;
background:rgba(255,255,255,0.05);
padding:12px;
border-radius:12px;
text-align:center;
}

/* MSG */
#msg{text-align:center;margin-top:10px;color:#7CFFC4}

.footer{text-align:center;padding:15px;font-size:12px;opacity:.6}
</style>
</head>

<body>

<div class="app">

<div class="header">
<h1>سيواك</h1>
</div>

<div class="hero">
<div class="hero-text">حجز ڕەوزەی شەریف 🌙</div>
</div>

<div class="time">
<div id="clock"></div>
<div id="hijri"></div>
</div>

<div class="card">

<form id="form">

<input name="name" placeholder="👤 ناوی سیانی" required>
<input name="whatsapp" placeholder="📱 واتسئاپ" required>

<select name="type" required>
<option value="">📌 جۆر</option>
<option>گروپ</option>
<option>تاک</option>
</select>

<select name="payment" required>
<option value="">💳 پارەدان</option>
<option>FIB</option>
<option>FastPay</option>
<option>Qi Card</option>
</select>

<input type="date" name="date" required>

<input type="file" id="file">
<textarea name="note" placeholder="📝 تێبینی"></textarea>

<button id="btn">ناردن</button>

</form>

<div id="msg"></div>

</div>

<div class="card">
<div class="stats">

<div class="stat">
<div>👁 سەردان</div>
<div id="views">0</div>
</div>

<div class="stat">
<div>🟢 ئۆنلاین</div>
<div id="online">1</div>
</div>

</div>
</div>

<div class="footer">© Siwak</div>

</div>

<script>
// CLOCK
setInterval(()=>{
document.getElementById("clock").innerText =
new Date().toLocaleTimeString();
},1000);

// HIJRI
let h=new HijriDate();
document.getElementById("hijri").innerText=h.toString();

// STATS
let views=localStorage.getItem("views")||0;
views++;
localStorage.setItem("views",views);
document.getElementById("views").innerText=views;

document.getElementById("online").innerText=
Math.floor(Math.random()*10)+1;

// FORM + IMAGE FIX
const form=document.getElementById("form");
const btn=document.getElementById("btn");
const msg=document.getElementById("msg");

form.addEventListener("submit",async(e)=>{
e.preventDefault();
btn.innerText="⏳...";

const file=document.getElementById("file").files[0];
let imageBase64="";

if(file){
const reader=new FileReader();
reader.onload=async function(){
imageBase64=reader.result;

sendData(imageBase64);
};
reader.readAsDataURL(file);
}else{
sendData("");
}

async function sendData(img){
const data=new FormData(form);
data.append("image",img);

await fetch("https://formspree.io/f/mdayqnoj",{
method:"POST",
body:data,
headers:{'Accept':'application/json'}
});

msg.innerText="✅ نێردرا";
btn.innerText="ناردن";
form.reset();
}
});
</script>

</body>
</html>
