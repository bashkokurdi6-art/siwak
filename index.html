<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<title>سیواك</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<style>
body{font-family:sans-serif;background:#0b1d1a;color:white}
input,select,textarea{width:100%;margin:10px 0;padding:10px}
button{padding:12px;background:green;color:white;border:none}
</style>
</head>

<body>

<h2>سیواك - حجز ڕەوزە</h2>

<input id="name" placeholder="ناوی سیانی">
<input id="phone" placeholder="واتسئاپ">

<select id="type">
<option>گروپ</option>
<option>تاک</option>
</select>

<select id="pay">
<option>FIB</option>
<option>FastPay</option>
<option>Qi Card</option>
</select>

<input type="file" id="visa">
<textarea id="note" placeholder="تێبینی"></textarea>

<button onclick="send()">ناردن</button>

<script>
// 🔥 CONFIG (لە Firebase کۆپی بکە)
const firebaseConfig = {
  apiKey: "PUT-YOURS",
  authDomain: "PUT-YOURS",
  projectId: "PUT-YOURS",
  storageBucket: "PUT-YOURS",
  messagingSenderId: "PUT-YOURS",
  appId: "PUT-YOURS"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

async function send(){
    let file = document.getElementById("visa").files[0];

    // upload image
    let ref = storage.ref("visa/" + file.name);
    await ref.put(file);
    let url = await ref.getDownloadURL();

    // save data
    await db.collection("orders").add({
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        type: document.getElementById("type").value,
        pay: document.getElementById("pay").value,
        note: document.getElementById("note").value,
        visa: url,
        time: new Date()
    });

    alert("بەسەرکەوتوویی نێردرا");
}
</script>

</body>
</html>
