<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سيواك</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hijri-date/lib/safe.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Cairo',sans-serif;
background:linear-gradient(180deg,#021a17,#063c34);
color:#fff;
display:flex;
justify-content:center;
}

.app{width:100%;max-width:420px;padding-bottom:20px}

/* HEADER */
.header{text-align:center;padding:20px}
.header h1{
font-size:36px;
font-weight:700;
background:linear-gradient(45deg,#ffd700,#ffffff);
-webkit-background-clip:text;
color:transparent;
}

/* HERO */
.hero{
margin:10px;
border-radius:20px;
overflow:hidden;
}

.hero img{
width:100%;
display:block;
}

/* HERO TEXT */
.hero-text{
position:absolute;
bottom:20px;
left:20px;
right:20px;
background:rgba(0,0,0,.5);
padding:10px;
border-radius:12px;
text-align:center;
}

/* TIME */
.time{
display:flex;
justify-content:space-between;
margin:10px;
padding:15px;
border-radius:16px;
background:rgba(255,255,255,0.05);
}

/* CARD */
.card{
margin:15px;
padding:18px;
border-radius:18px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
}

/* INPUT */
input,select,textarea{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:14px;
background:rgba(255,255,255,0.08);
color:#fff;
}

/* BUTTON */
button{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:linear-gradient(45deg,#1fa37a,#18c29c);
font-size:16px;
font-weight:bold;
}

/* STATS */
.stats{
display:flex;
justify-content:space-between;
gap:10px;
}

.stat{
flex:1;
text-align:center;
padding:15px;
border-radius:14px;
background:rgba(255,255,255,0.05);
}

.big{font-size:22px;font-weight:bold}

.footer{text-align:center;font-size:12px;opacity:.6;margin-top:10px}
</style>
</head>

<body>

<div class="app">

<div class="header">
<h1>سيواك</h1>
<p>حجز ڕەوزەی شەریف</p>
</div>

<div class="hero">
<img src="https://images.unsplash.com/photo-1591608516733-0e0c6c1c7e1d">
</div>

<div class="time">
<div>
⏰ <span id="clock"></span>
</div>
<div>
📅 <span id="hijri"></span>
</div>
</div>

<div class="card">

<form action="https://formspree.io/f/mdayqnoj" method="POST">

<input name="name" placeholder="👤 ناوی سیانی" required>
<input name="whatsapp" placeholder="📱 واتسئاپ" required>

<select name="type">
<option>👥 گروپ</option>
<option>👤 تاک</option>
</select>

<select name="payment">
<option>💳 FIB</option>
<option>💳 FastPay</option>
<option>💳 Qi Card</option>
</select>

<input type="date" name="date">

<input type="file" name="file">

<textarea name="note" placeholder="📝 تێبینی"></textarea>

<button>✈️ ناردن</button>

</form>

</div>

<div class="card stats">

<div class="stat">
👁 سەردان
<div id="views" class="big">0</div>
</div>

<div class="stat">
🟢 ئۆنلاین
<div id="online" class="big">1</div>
</div>

</div>

<div class="footer">© Siwak</div>

</div>

<script>
setInterval(()=>{
document.getElementById("clock").innerText=
new Date().toLocaleTimeString();
},1000);

let h=new HijriDate();
document.getElementById("hijri").innerText=h.toString();

let views=localStorage.getItem("views")||0;
views++;
localStorage.setItem("views",views);
document.getElementById("views").innerText=views;

document.getElementById("online").innerText=
Math.floor(Math.random()*10)+1;
</script>

</body>
</html>
