<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIWAK</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:sans-serif;
background:url("bg.jpg") center/cover fixed;
color:white;
padding-top:200px;
}
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:-1;
}
.section{position:relative;margin:15px;cursor:pointer}
.section img{width:100%;height:200px;object-fit:cover;border-radius:20px}
.title{
position:absolute;bottom:10px;left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
padding:10px 20px;border-radius:12px
}
.hotels{display:none;margin:10px}
.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:15px;margin:12px 0;border-radius:15px;
cursor:pointer
}
.form{
display:none;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
margin:15px;padding:18px;border-radius:20px
}
input,textarea{
width:100%;padding:12px;margin:6px 0;border-radius:12px;
background:rgba(255,255,255,0.2);color:white;border:none
}
.payRow{display:flex;gap:10px;margin:10px 0}
.payCard{flex:1;padding:12px;border-radius:12px;background:rgba(255,255,255,0.2);text-align:center;cursor:pointer}
.payCard.active{background:#20c997}
.accountBox{background:rgba(0,0,0,0.4);padding:10px;border-radius:10px;display:none}
.uploadBox{border:2px dashed #ccc;padding:15px;border-radius:12px;text-align:center}
#preview{width:100%;display:none;margin-top:10px;border-radius:10px}
.btn{background:#20c997;padding:12px;border-radius:12px;text-align:center;cursor:pointer}
.popup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center
}
.popupBox{background:white;color:black;padding:20px;border-radius:15px}
</style>
</head>

<body>

<div class="section" onclick="toggle('makkah')">
<img src="kaaba.jpg">
<div class="title">هوتێلەکانی مککە</div>
</div>
<div id="makkah" class="hotels"></div>

<div class="section" onclick="toggle('madina')">
<img src="madina.jpg">
<div class="title">هوتێلەکانی مەدینە</div>
</div>
<div id="madina" class="hotels"></div>

<form id="formBox" class="form">
<input type="hidden" id="hotelInput">
<input name="name" placeholder="ناوی سیانی">
<input name="phone" placeholder="ژمارەی مۆبایل">

<div class="payRow">
<div class="payCard" onclick="selectPay(this,'FIB')">FIB</div>
<div class="payCard" onclick="selectPay(this,'FastPay')">FastPay</div>
<div class="payCard" onclick="selectPay(this,'QiCard')">QiCard</div>
</div>

<div id="accountBox" class="accountBox"></div>

<div class="uploadBox">
📸 وێنە
<input type="file" onchange="previewImg(event)">
</div>

<img id="preview">

<textarea name="note" placeholder="تێبینی"></textarea>

<button class="btn">✔️ ناردن</button>
</form>

<div id="popup" class="popup">
<div class="popupBox" id="popupContent"></div>
</div>

<script defer>

/* DATA */
let data = JSON.parse(localStorage.getItem("adminData")) || {
makkah:[],
madina:[],
payments:{FIB:"0750 XXX",FastPay:"0770 XXX",QiCard:"0780 XXX"}
}

/* FIX 14 HOTELS */
function fix(list,city){
if(!list || list.length!==14){
let arr=[]
for(let i=1;i<=14;i++){
arr.push({name:city+" Hotel "+i,rating:4.5,price:100+i})
}
return arr
}
return list
}

data.makkah = fix(data.makkah,"Makkah")
data.madina = fix(data.madina,"Madina")

/* 🔥 IMPORTANT FIX */
localStorage.setItem("adminData", JSON.stringify(data))

/* RENDER */
function render(id,list){
let html=""
list.forEach(h=>{
html+=`
<div class="card" onclick="openForm('${h.name}')">
<b>🏨 ${h.name}</b><br>
⭐ ${h.rating}<br>
💰 $${h.price}
</div>`
})
document.getElementById(id).innerHTML=html
}

render("makkah",data.makkah)
render("madina",data.madina)

/* TOGGLE */
function toggle(id){
let e=document.getElementById(id)
e.style.display=e.style.display=="block"?"none":"block"
}

/* 🔥 FIX SCROLL */
function openForm(n){
document.getElementById("formBox").style.display="block"
document.getElementById("hotelInput").value=n

document.getElementById("formBox").scrollIntoView({
behavior:"smooth"
})
}

/* PAYMENT */
function selectPay(el,m){
document.querySelectorAll(".payCard").forEach(c=>c.classList.remove("active"))
el.classList.add("active")

let b=document.getElementById("accountBox")
b.style.display="block"
b.innerText="ژمارە: "+data.payments[m]
}

/* PREVIEW */
function previewImg(e){
let img=document.getElementById("preview")
img.src=URL.createObjectURL(e.target.files[0])
img.style.display="block"
}

/* SAVE ORDER */
document.getElementById("formBox").onsubmit=function(e){
e.preventDefault()

let orders = JSON.parse(localStorage.getItem("orders")) || []

orders.push({
hotel:hotelInput.value,
name:this.name.value,
phone:this.phone.value,
note:this.note.value,
payment:document.querySelector(".active")?.innerText || "",
status:"pending",
date:new Date().toLocaleString()
})

localStorage.setItem("orders",JSON.stringify(orders))

popup("✔️ داواکاریەکەت بە سەرکەوتوویی نێردرا")
}

/* POPUP */
function popup(t){
popupContent.innerText=t
popup.style.display="flex"
setTimeout(()=>popup.style.display="none",2000)
}

</script>

</body>
</html>
