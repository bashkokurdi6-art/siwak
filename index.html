<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سیواك</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hijri-date/lib/safe.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Cairo',sans-serif;
  background:linear-gradient(180deg,#021a17,#063c34);
  color:#fff;
  display:flex;
  justify-content:center;
}

.app{width:100%;max-width:420px}

.header{text-align:center;padding:15px}
.header h1{font-size:28px;font-weight:700;letter-spacing:1px}

.hero{
  height:220px;
  margin:10px;
  border-radius:20px;
  background:
  linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.8)),
  url('https://images.unsplash.com/photo-1542810634-71277d95dcbb');
  background-size:cover;
  display:flex;
  align-items:flex-end;
  padding:20px;
  font-size:18px;
  animation:fade 1.5s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1}
}

.time{text-align:center;margin-top:10px;opacity:.8}

.card{
  margin:15px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(15px);
}

input,select,textarea{
  width:100%;
  padding:14px;
  margin:8px 0;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

.preview{
  width:100%;
  margin-top:10px;
  border-radius:12px;
}

button{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:16px;
  background:linear-gradient(45deg,#1fa37a,#18c29c);
  font-weight:bold;
}

#msg{text-align:center;margin-top:10px;color:#7CFFC4}

.footer{text-align:center;padding:15px;font-size:12px;opacity:.6}
</style>
</head>

<body>

<div class="app">

<!-- HEADER -->
<div class="header">
  <h1>سيواك</h1>
</div>

<!-- HERO -->
<div class="hero">
  حجز ڕەوزەی شەریف 🌙
</div>

<!-- TIME -->
<div class="time">
  <div id="clock"></div>
  <div id="hijri"></div>
</div>

<!-- FORM -->
<div class="card">

<form id="form" action="https://formspree.io/f/mdayqnoj" method="POST">

<input name="name" placeholder="👤 ناوی سیانی" required minlength="3">

<input name="whatsapp" placeholder="📱 واتسئاپ" required pattern="[0-9+ ]{8,}">

<select name="type" required>
<option value="">📌 جۆر</option>
<option>گروپ</option>
<option>تاک</option>
</select>

<select name="payment" required>
<option value="">💳 پارەدان</option>
<option>FIB</option>
<option>FastPay</option>
<option>Qi Card</option>
</select>

<!-- NEW DATE -->
<input type="date" name="date" required>

<input type="file" id="file" name="visa" accept="image/*">
<img id="preview" class="preview" style="display:none">

<textarea name="note" placeholder="📝 تێبینی"></textarea>

<input type="hidden" name="_subject" value="حجزێکی نوێ">

<button id="btn">ناردن</button>

</form>

<div id="msg"></div>

</div>

<!-- FOOTER -->
<div class="footer">© Siwak</div>

<!-- STATS -->
<div class="card" style="text-align:center">

  <div>👁 ژمارەی سەردان</div>
  <h2 id="views">0</h2>

  <div style="margin-top:10px">🟢 ئێستا ئۆنلاین</div>
  <h3 id="online">1</h3>

</div>

</div>

<script>
// CLOCK
setInterval(()=>{
  document.getElementById("clock").innerHTML =
    new Date().toLocaleTimeString();
},1000);

// HIJRI
let h = new HijriDate();
document.getElementById("hijri").innerHTML = h.toString();

// IMAGE PREVIEW
document.getElementById("file").onchange = e=>{
  const file = e.target.files[0];
  if(!file) return;
  const img = document.getElementById("preview");
  img.src = URL.createObjectURL(file);
  img.style.display="block";
};

// FORM
const form = document.getElementById("form");
const msg = document.getElementById("msg");
const btn = document.getElementById("btn");

form.addEventListener("submit", async (e)=>{
 e.preventDefault();

 btn.innerText="⏳ چاوەڕێ بکە...";
 btn.disabled=true;

 try{
   const res = await fetch(form.action,{
     method:"POST",
     body:new FormData(form),
     headers:{'Accept':'application/json'}
   });

   if(res.ok){
     msg.innerHTML="✅ نێردرا بەسەرکەوتوویی";
     form.reset();
     document.getElementById("preview").style.display="none";
   }else{
     msg.innerHTML="❌ هەڵەیەک هەیە";
   }
 }catch{
   msg.innerHTML="❌ هەڵەی نێتۆرک";
 }

 btn.innerText="ناردن";
 btn.disabled=false;
});

// VIEWS (local)
let views = localStorage.getItem("views") || 0;
views++;
localStorage.setItem("views", views);
document.getElementById("views").innerText = views;

// ONLINE (fake)
document.getElementById("online").innerText =
  Math.floor(Math.random()*10)+1;
</script>

</body>
</html>
