<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Siwak Booking</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic&display=swap" rel="stylesheet">

<style>
body { font-family: 'Noto Sans Arabic', sans-serif; }
</style>

</head>

<body class="bg-gray-100 text-right">

<!-- 🔝 HEADER -->
<header class="bg-green-900 text-white p-4 flex items-center gap-3">
  <img src="images/logo.jpg" class="w-10 h-10 rounded-full">
  <h1 class="text-xl">سیواک</h1>
</header>

<!-- 🕌 HERO -->
<div class="p-4">
  <img src="images/hero.jpg" class="w-full rounded">
</div>

<!-- INFO -->
<div class="p-4 bg-white m-4 rounded shadow">
  <img src="images/info.jpg" class="rounded mb-3">
  <p>زانیاری دەربارەی ڕۆژوی شریف...</p>
</div>

<!-- 🧾 FORM -->
<div class="p-4 bg-white m-4 rounded shadow space-y-3">

  <h2 class="font-bold">فۆرمی حجز</h2>

  <!-- 1 ناو -->
  <input class="border p-2 w-full rounded" placeholder="ناوی سیانی">

  <!-- 2 واتساپ -->
  <input class="border p-2 w-full rounded" placeholder="ژمارەی واتساپ">

  <!-- 3 option -->
  <select class="border p-2 w-full rounded">
    <option>گروپ</option>
    <option>تاک</option>
  </select>

  <!-- 4 upload visa -->
  <label class="block">وێنەی ڤیزا:</label>
  <input type="file" class="border p-2 w-full">

  <!-- 5 note -->
  <textarea class="border p-2 w-full rounded" placeholder="تێبینی"></textarea>

  <!-- 6 payment -->
  <div class="bg-gray-100 p-3 rounded">
    <p>پارەدان:</p>
    <p>Fib: 0750xxxxxxx</p>
    <p>FastPay: 0770xxxxxxx</p>
    <p>Qi Card: 0780xxxxxxx</p>
  </div>

  <!-- 7 submit -->
  <button class="bg-green-800 text-white w-full py-2 rounded">
    ناردن
  </button>

</div>

</body>
</html>
