<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIWAK</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:sans-serif;

/* 🔥 BACKGROUND */
background:url("https://raw.githubusercontent.com/bashkokurdi6-art/siwak/main/bg.jpg") no-repeat center center fixed;
background-size:cover;
color:white;
}

/* overlay */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:-1;
}

/* header */
.header{
text-align:center;
padding:20px;
font-size:26px;
font-weight:bold;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
}

/* search */
.search{
margin:15px;
}

.search input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
outline:none;
}

/* grid */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:10px;
}

/* card */
.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
border-radius:20px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
border:1px solid rgba(255,255,255,0.2);
}

.card:hover{
transform:scale(1.04);
}

.card img{
width:100%;
height:130px;
object-fit:cover;
}

.cardContent{
padding:10px;
}

.price{
color:#20c997;
font-weight:bold;
}

/* booking */
.booking{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
color:black;
margin:15px;
padding:15px;
border-radius:20px;
animation:fadeUp 0.8s ease;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:1px solid #ccc;
}

.btn{
background:linear-gradient(90deg,#198754,#20c997);
color:white;
padding:14px;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* animation */
@keyframes fadeUp{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<div class="header">SIWAK 🕌</div>

<div class="search">
<input placeholder="🔍 گەڕان بۆ هۆتێل..." onkeyup="search(this.value)">
</div>

<div id="hotels" class="grid"></div>

<div class="booking">
<b id="selected">هیچ هەڵنەبژێردراوە</b>

<input type="date" id="in">
<input type="date" id="out">

<div class="btn" onclick="book()">✔️ حجز بکە</div>
</div>

<script>

let hotels=[
{n:"Swissotel",p:200,img:"https://images.unsplash.com/photo-1551882547-ff40c63fe5fa"},
{n:"Hilton",p:180,img:"https://images.unsplash.com/photo-1542314831-068cd1dbfeeb"},
{n:"Pullman",p:150,img:"https://images.unsplash.com/photo-1566073771259-6a8506099945"},
{n:"Anjum",p:120,img:"https://images.unsplash.com/photo-1582719478250-c89cae4dc85b"}
];

let selected="";

// render
function render(list){
let out="";
list.forEach(h=>{
out+=`
<div class="card" onclick="select('${h.n}',${h.p})">
<img src="${h.img}">
<div class="cardContent">
<div>${h.n}</div>
<div class="price">$${h.p}</div>
</div>
</div>`;
});
document.getElementById("hotels").innerHTML=out;
}

// search
function search(val){
let f=hotels.filter(h=>h.n.toLowerCase().includes(val.toLowerCase()));
render(f);
}

// select
function select(n,p){
selected=n+" - $"+p;
document.getElementById("selected").innerText=selected;

window.scrollTo({top:500,behavior:"smooth"});
}

// book
function book(){
alert("✔️ حجز کرا:\n"+selected);
}

render(hotels);

</script>

</body>
</html>
