<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سيواك</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hijri-date/lib/safe.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Cairo',sans-serif;
background:#021a17;
color:#fff;
}

/* WRAP */
.wrap{
max-width:420px;
margin:auto;
padding:24px 18px 30px;
}

/* HEADER */
.header{
text-align:center;
margin-bottom:28px;
}
.header h1{
font-size:34px;
font-weight:800;
letter-spacing:1px;
}
.header p{
opacity:.5;
font-size:13px;
margin-top:4px;
}

/* HERO (clean banner) */
.hero{
border-radius:18px;
overflow:hidden;
margin-bottom:22px;
}
.hero img{
width:100%;
height:180px;
object-fit:cover;
}

/* TIME */
.time{
display:flex;
justify-content:space-between;
margin-bottom:26px;
font-size:13px;
opacity:.6;
}

/* FORM CARD */
.card{
padding:18px;
border-radius:20px;
background:#062925;
margin-bottom:20px;
}

/* INPUT */
.input{
width:100%;
padding:15px;
margin-bottom:12px;
border-radius:14px;
border:none;
background:#08352f;
color:#fff;
}

/* BUTTON */
.button{
width:100%;
padding:16px;
border-radius:16px;
border:none;
background:#1fa37a;
font-weight:700;
font-size:15px;
}

/* STATS */
.stats{
display:flex;
justify-content:space-between;
margin-top:20px;
}
.stat{
flex:1;
text-align:center;
}
.stat h2{
font-size:22px;
font-weight:700;
}
.stat span{
font-size:11px;
opacity:.4;
}

/* FOOTER */
.footer{
text-align:center;
margin-top:28px;
opacity:.3;
font-size:12px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<h1>سيواك</h1>
<p>حجز ڕەوزەی شەریف</p>
</div>

<div class="hero">
<img src="https://images.unsplash.com/photo-1591608516733-0e0c6c1c7e1d">
</div>

<div class="time">
<div>⏰ <span id="clock"></span></div>
<div>📅 <span id="hijri"></span></div>
</div>

<div class="card">

<form action="https://formspree.io/f/mdayqnoj" method="POST">

<input class="input" name="name" placeholder="ناوی سیانی">
<input class="input" name="whatsapp" placeholder="واتسئاپ">

<select class="input" name="type">
<option>گروپ</option>
<option>تاک</option>
</select>

<select class="input" name="payment">
<option>FIB</option>
<option>FastPay</option>
<option>Qi Card</option>
</select>

<input class="input" type="date" name="date">
<input class="input" type="file" name="file">

<textarea class="input" name="note" placeholder="تێبینی"></textarea>

<button class="button">ناردن</button>

</form>

</div>

<div class="stats">
<div class="stat">
<h2 id="views">0</h2>
<span>سەردان</span>
</div>

<div class="stat">
<h2 id="online">1</h2>
<span>ئۆنلاین</span>
</div>
</div>

<div class="footer">© Siwak</div>

</div>

<script>
setInterval(()=>{document.getElementById("clock").innerText=new Date().toLocaleTimeString();},1000);
let h=new HijriDate();
document.getElementById("hijri").innerText=h.toString();

let v=localStorage.getItem("v")||0;
v++;localStorage.setItem("v",v);
document.getElementById("views").innerText=v;

document.getElementById("online").innerText=Math.floor(Math.random()*10)+1;
</script>

</body>
</html>
