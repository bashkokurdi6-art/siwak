<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIWAK</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:sans-serif;
background:url("bg.jpg") center/cover fixed;
color:white;
}

/* overlay */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:-1;
}

/* section */
.section{
position:relative;
margin:15px;
cursor:pointer;
}

.section img{
width:100%;
height:200px;
object-fit:cover;
border-radius:20px;
}

/* title on image */
.title{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:10px 20px;
border-radius:12px;
font-size:18px;
}

/* hotels */
.hotels{
display:none;
margin:10px;
}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:12px;
margin:10px 0;
border-radius:15px;
cursor:pointer;
}

/* form */
.form{
display:none;
background:rgba(255,255,255,0.95);
color:black;
margin:15px;
padding:15px;
border-radius:20px;
}

input,select,textarea{
width:100%;
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid #ccc;
}

.btn{
background:linear-gradient(90deg,#198754,#20c997);
color:white;
padding:12px;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
font-weight:bold;
}

/* preview */
#preview{
width:100%;
margin-top:10px;
display:none;
border-radius:10px;
}
</style>
</head>

<body>

<!-- MAKKA -->
<div class="section" onclick="toggle('makkah')">
<img src="kaaba.jpg">
<div class="title">هوتێلەکانی مککە</div>
</div>

<div id="makkah" class="hotels"></div>

<!-- MADINA -->
<div class="section" onclick="toggle('madina')">
<img src="madina.jpg">
<div class="title">هوتێلەکانی مەدینە</div>
</div>

<div id="madina" class="hotels"></div>

<!-- FORM -->
<form id="formBox" class="form" action="https://formspree.io/f/mqedjear" method="POST">

<input type="hidden" name="hotel" id="hotelInput">

<input name="name" placeholder="ناوی سیانی" required>
<input name="phone" placeholder="ژمارەی مۆبایل" required>

<select name="payment">
<option>FIB</option>
<option>FastPay</option>
<option>QiCard</option>
</select>

<input type="file" onchange="previewImg(event)">
<img id="preview">

<textarea name="note" placeholder="تێبینی"></textarea>

<button class="btn" type="submit">✔️ ناردن</button>

</form>

<script>

// 7 hotels
let hotels = ["Hotel 1","Hotel 2","Hotel 3","Hotel 4","Hotel 5","Hotel 6","Hotel 7"];

function render(id){
let html="";
hotels.forEach(h=>{
html+=`
<div class="card" onclick="openForm('${h}')">
🏨 ${h}<br>
⭐ 4.5<br>
📍 city<br>
💰 $120
</div>`;
});
document.getElementById(id).innerHTML=html;
}

render("makkah");
render("madina");

// toggle section
function toggle(id){
let el=document.getElementById(id);
el.style.display = el.style.display=="block"?"none":"block";
}

// open form
function openForm(name){
document.getElementById("formBox").style.display="block";
document.getElementById("hotelInput").value = name;
window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
}

// preview image
function previewImg(e){
let img=document.getElementById("preview");
img.src=URL.createObjectURL(e.target.files[0]);
img.style.display="block";
}

// alert after send
document.getElementById("formBox").addEventListener("submit",function(){
setTimeout(()=>{alert("✔️ ناردرا بە سەرکەوتوویی");},500);
});

</script>

</body>
</html>
