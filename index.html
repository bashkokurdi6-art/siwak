<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIWAK</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:sans-serif;

/* 🔥 BACKGROUND */
background-image:url("bg.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
}

/* overlay بۆ ڕوونبوون */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:-1;
}

/* header */
.header{
text-align:center;
padding:20px;
font-size:24px;
font-weight:bold;
}

/* grid */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

/* card */
.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:15px;
overflow:hidden;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.cardContent{
padding:10px;
}

.price{color:#20c997}

/* booking box */
.booking{
background:white;
color:black;
margin:10px;
padding:10px;
border-radius:15px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:1px solid #ccc;
}

.btn{
background:#198754;
color:white;
padding:12px;
text-align:center;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">SIWAK 🕌</div>

<div id="hotels" class="grid"></div>

<div class="booking">
<b id="selected">هیچ</b>

<input type="date" id="in">
<input type="date" id="out">

<div class="btn" onclick="book()">✔️ حجز</div>
</div>

<script>

// hotels
let hotels=[
{n:"Swissotel",p:200,img:"https://images.unsplash.com/photo-1551882547-ff40c63fe5fa"},
{n:"Hilton",p:180,img:"https://images.unsplash.com/photo-1542314831-068cd1dbfeeb"},
{n:"Pullman",p:150,img:"https://images.unsplash.com/photo-1566073771259-6a8506099945"}
];

let selected="";

// render
let out="";
hotels.forEach(h=>{
out+=`
<div class="card" onclick="select('${h.n}',${h.p})">
<img src="${h.img}">
<div class="cardContent">
<div>${h.n}</div>
<div class="price">$${h.p}</div>
</div>
</div>`;
});
document.getElementById("hotels").innerHTML=out;

// select
function select(n,p){
selected=n+" - $"+p;
document.getElementById("selected").innerText=selected;
}

// book
function book(){
alert("✔️ حجز کرا: "+selected);
}

</script>

</body>
</html>
