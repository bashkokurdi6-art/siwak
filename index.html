<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سيواك</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hijri-date/lib/safe.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Cairo',sans-serif;
background:#021a17;
color:#fff;
}

/* CONTAINER */
.container{
max-width:420px;
margin:auto;
padding:20px;
}

/* HEADER */
.header{
text-align:center;
margin-bottom:20px;
}
.header h1{
font-size:30px;
font-weight:700;
}
.header p{
opacity:.5;
font-size:13px;
}

/* HERO */
.hero{
border-radius:14px;
overflow:hidden;
margin-bottom:20px;
}
.hero img{
width:100%;
height:160px;
object-fit:cover;
}

/* TIME */
.time{
display:flex;
justify-content:space-between;
font-size:13px;
opacity:.6;
margin-bottom:20px;
}

/* FORM */
.card{
background:#062925;
padding:16px;
border-radius:16px;
}

input,select,textarea{
width:100%;
padding:14px;
margin:6px 0;
border:none;
border-radius:12px;
background:#08352f;
color:#fff;
}

button{
width:100%;
padding:14px;
margin-top:8px;
border:none;
border-radius:14px;
background:#1fa37a;
font-weight:600;
}

/* STATS */
.stats{
display:flex;
justify-content:space-between;
margin-top:20px;
}
.stat{
text-align:center;
flex:1;
}
.stat h2{
font-size:20px;
}
.stat span{
font-size:11px;
opacity:.4;
}

.footer{
text-align:center;
margin-top:20px;
opacity:.3;
font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>سيواك</h1>
<p>حجز ڕەوزەی شەریف</p>
</div>

<div class="hero">
<img src="https://images.unsplash.com/photo-1591608516733-0e0c6c1c7e1d">
</div>

<div class="time">
<div>⏰ <span id="clock"></span></div>
<div>📅 <span id="hijri"></span></div>
</div>

<div class="card">

<form action="https://formspree.io/f/mdayqnoj" method="POST">

<input name="name" placeholder="ناوی سیانی">
<input name="whatsapp" placeholder="واتسئاپ">

<select name="type">
<option>گروپ</option>
<option>تاک</option>
</select>

<select name="payment">
<option>FIB</option>
<option>FastPay</option>
<option>Qi Card</option>
</select>

<input type="date" name="date">
<input type="file" name="file">

<textarea name="note" placeholder="تێبینی"></textarea>

<button>ناردن</button>

</form>

</div>

<div class="stats">
<div class="stat">
<h2 id="views">0</h2>
<span>سەردان</span>
</div>

<div class="stat">
<h2 id="online">1</h2>
<span>ئۆنلاین</span>
</div>
</div>

<div class="footer">© Siwak</div>

</div>

<script>
setInterval(()=>{
document.getElementById("clock").innerText=new Date().toLocaleTimeString();
},1000);

let h=new HijriDate();
document.getElementById("hijri").innerText=h.toString();

let v=localStorage.getItem("v")||0;
v++;localStorage.setItem("v",v);
document.getElementById("views").innerText=v;

document.getElementById("online").innerText=Math.floor(Math.random()*10)+1;
</script>

</body>
</html>
