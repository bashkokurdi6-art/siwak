<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سيواك</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hijri-date/lib/safe.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Cairo',sans-serif;
background:radial-gradient(circle at top,#063c34,#021a17);
color:#fff;
display:flex;
justify-content:center;
}

/* APP */
.app{
width:100%;
max-width:420px;
padding-bottom:30px;
animation:fade 1s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

/* HEADER */
.header{
text-align:center;
padding:25px 10px;
}
.header h1{
font-size:44px;
font-weight:800;
background:linear-gradient(45deg,#ffd700,#fff);
-webkit-background-clip:text;
color:transparent;
}
.header p{opacity:.6}

/* HERO */
.hero{
margin:12px;
border-radius:28px;
overflow:hidden;
position:relative;
box-shadow:0 20px 60px rgba(0,0,0,.7);
}
.hero img{
width:100%;
height:210px;
object-fit:cover;
transition:0.4s;
}
.hero:hover img{transform:scale(1.05)}

.hero::after{
content:'';
position:absolute;
inset:0;
background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
}

.hero-text{
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,.6);
padding:10px 18px;
border-radius:25px;
font-size:14px;
backdrop-filter:blur(6px);
}

/* TIME */
.time{
margin:12px;
padding:16px;
border-radius:22px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
}

/* CARD */
.card{
margin:12px;
padding:18px;
border-radius:26px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(14px);
box-shadow:0 10px 40px rgba(0,0,0,.6);
}

/* INPUT */
input,select,textarea{
width:100%;
padding:15px;
margin:8px 0;
border:none;
border-radius:18px;
background:rgba(255,255,255,0.08);
color:#fff;
transition:.2s;
}
input:focus,select:focus,textarea:focus{
outline:none;
background:rgba(255,255,255,0.12);
}

/* BUTTON */
button{
width:100%;
padding:16px;
margin-top:10px;
border:none;
border-radius:24px;
background:linear-gradient(45deg,#1fa37a,#3cffc4);
font-weight:800;
font-size:16px;
box-shadow:0 10px 30px rgba(0,255,170,.4);
transition:.2s;
}
button:hover{
transform:scale(1.03);
}

/* STATS */
.stats{
display:flex;
gap:10px;
}
.stat{
flex:1;
text-align:center;
padding:18px;
border-radius:22px;
background:rgba(255,255,255,0.05);
}
.stat .big{
font-size:28px;
font-weight:800;
}

/* FOOTER */
.footer{
text-align:center;
margin-top:20px;
opacity:.4;
font-size:12px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<h1>سيواك</h1>
<p>حجز ڕەوزەی شەریف</p>
</div>

<div class="hero">
<img src="https://images.unsplash.com/photo-1591608516733-0e0c6c1c7e1d">
<div class="hero-text">حجز ئاسان و بەڕێوەچوونی پڕۆفیشناڵ 🌙</div>
</div>

<div class="time">
<div>⏰ <span id="clock"></span></div>
<div>📅 <span id="hijri"></span></div>
</div>

<div class="card">
<form action="https://formspree.io/f/mdayqnoj" method="POST">

<input name="name" placeholder="👤 ناوی سیانی" required>
<input name="whatsapp" placeholder="📱 واتسئاپ" required>

<select name="type">
<option>👥 گروپ</option>
<option>👤 تاک</option>
</select>

<select name="payment">
<option>💳 FIB</option>
<option>💳 FastPay</option>
<option>💳 Qi Card</option>
</select>

<input type="date" name="date">
<input type="file" name="file">

<textarea name="note" placeholder="📝 تێبینی"></textarea>

<button>✈️ ناردن</button>

</form>
</div>

<div class="card stats">

<div class="stat">
👁 سەردان
<div id="views" class="big">0</div>
</div>

<div class="stat">
🟢 ئۆنلاین
<div id="online" class="big">1</div>
</div>

</div>

<div class="footer">© Siwak</div>

</div>

<script>
setInterval(()=>{
document.getElementById("clock").innerText=new Date().toLocaleTimeString();
},1000);

let h=new HijriDate();
document.getElementById("hijri").innerText=h.toString();

let v=localStorage.getItem("v")||0;
v++;localStorage.setItem("v",v);
document.getElementById("views").innerText=v;

document.getElementById("online").innerText=Math.floor(Math.random()*10)+1;
</script>

</body>
</html>
