<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIWAK PRO</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:sans-serif;
background:url("bg.jpg") no-repeat center center fixed;
background-size:cover;
color:white;
}

/* overlay */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:-1;
}

/* section */
.section{
margin:20px;
text-align:center;
cursor:pointer;
}

.section img{
width:100%;
height:200px;
border-radius:20px;
object-fit:cover;
}

.title{
margin:10px 0;
font-size:22px;
font-weight:bold;
}

/* dashboard */
.grid{
display:none;
grid-template-columns:1fr 1fr;
gap:10px;
margin:15px;
}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:10px;
border-radius:15px;
}

/* payment */
.payment{
display:none;
background:rgba(255,255,255,0.9);
color:black;
margin:15px;
padding:15px;
border-radius:20px;
}

input,select,textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:1px solid #ccc;
}

.btn{
background:#198754;
color:white;
padding:12px;
border-radius:10px;
text-align:center;
margin-top:10px;
cursor:pointer;
}

/* preview */
#preview{
width:100%;
margin-top:10px;
display:none;
border-radius:10px;
}
</style>
</head>

<body>

<!-- MAKKA -->
<div class="section" onclick="toggle('makkah')">
<img src="https://images.unsplash.com/photo-1587145820266-a5951ee6f620">
<div class="title">هوتێلەکانی مککە</div>
</div>

<div id="makkah" class="grid"></div>

<!-- MADINA -->
<div class="section" onclick="toggle('madina')">
<img src="https://images.unsplash.com/photo-1565557623262-b51c2513a641">
<div class="title">هوتێلەکانی مەدینە</div>
</div>

<div id="madina" class="grid"></div>

<!-- PAYMENT -->
<div class="payment" id="payBox">

<input placeholder="ناوی سیانی">
<input placeholder="ژمارەی مۆبایل">

<select id="paySelect" onchange="showNumber()">
<option value="">هەڵبژێرە</option>
<option>FIB</option>
<option>FastPay</option>
<option>QiCard</option>
</select>

<div id="payNumber"></div>

<input type="file" onchange="previewImg(event)">
<img id="preview">

<textarea placeholder="تێبینی"></textarea>

<div class="btn" onclick="send()">✔️ ناردن</div>

</div>

<script>

// data admin editable
let hotels = JSON.parse(localStorage.getItem("hotels")) || {
makkah:[
{n:"Hotel 1",r:"⭐4.5",l:"Makkah",p:"$120"},
{n:"Hotel 2",r:"⭐4.3",l:"Makkah",p:"$150"}
],
madina:[
{n:"Hotel A",r:"⭐4.6",l:"Madina",p:"$100"},
{n:"Hotel B",r:"⭐4.4",l:"Madina",p:"$130"}
]
};

// render dashboards
function render(){
["makkah","madina"].forEach(city=>{
let out="";
for(let i=0;i<7;i++){
let h=hotels[city][i] || {n:"Hotel",r:"⭐4",l:city,p:"$100"};
out+=`
<div class="card">
<div>${h.n}</div>
<div>${h.r}</div>
<div>${h.l}</div>
<div>${h.p}</div>
</div>`;
}
document.getElementById(city).innerHTML=out;
});
}

render();

// toggle
function toggle(id){
let el=document.getElementById(id);
el.style.display = el.style.display=="grid"?"none":"grid";
document.getElementById("payBox").style.display="block";
}

// payment numbers (admin editable)
let numbers={
FIB:"0750 XXX",
FastPay:"0770 XXX",
QiCard:"0780 XXX"
};

function showNumber(){
let val=document.getElementById("paySelect").value;
document.getElementById("payNumber").innerText=numbers[val] || "";
}

// preview image
function previewImg(e){
let file=e.target.files[0];
let reader=new FileReader();
reader.onload=function(){
let img=document.getElementById("preview");
img.src=reader.result;
img.style.display="block";
}
reader.readAsDataURL(file);
}

// send
function send(){
alert("✔️ ناردرا بە سەرکەوتوویی");
}

</script>

</body>
</html>
