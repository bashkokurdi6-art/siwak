<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سیواك</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hijri-date/lib/safe.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Cairo',sans-serif;
  background:linear-gradient(180deg,#021a17,#063c34);
  color:#fff;
  display:flex;
  justify-content:center;
}

/* APP */
.app{width:100%;max-width:420px}

/* HEADER */
.header{text-align:center;padding:15px}
.header img{width:55px}
.header h2{margin-top:5px}

/* HERO */
.hero{
  height:220px;
  margin:10px;
  border-radius:20px;
  background:
  linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.8)),
  url('https://images.unsplash.com/photo-1542810634-71277d95dcbb');
  background-size:cover;
  display:flex;
  align-items:flex-end;
  padding:20px;
  font-size:18px;
  animation:fade 1.5s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1}
}

/* TIME */
.time{
  text-align:center;
  margin-top:10px;
  opacity:.8;
}

/* CARD */
.card{
  margin:15px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(15px);
}

/* INPUT */
input,select,textarea{
  width:100%;
  padding:14px;
  margin:8px 0;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

/* FILE PREVIEW */
.preview{
  width:100%;
  margin-top:10px;
  border-radius:12px;
}

/* BUTTON */
button{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:16px;
  background:linear-gradient(45deg,#1fa37a,#18c29c);
  font-weight:bold;
}

/* MSG */
#msg{text-align:center;margin-top:10px;color:#7CFFC4}

/* FOOTER */
.footer{text-align:center;padding:15px;font-size:12px;opacity:.6}
</style>
</head>

<body>

<div class="app">

<div class="header">
  <img src="logo.jpg">
  <h2>سیواك</h2>
</div>

<div class="hero">
  حجز ڕەوزەی شەریف 🌙
</div>

<div class="time">
  <div id="clock"></div>
  <div id="hijri"></div>
</div>

<div class="card">

<form id="form" action="https://formspree.io/f/mdayqnoj" method="POST">

<input name="name" placeholder="👤 ناوی سیانی" required>
<input name="whatsapp" placeholder="📱 واتسئاپ" required>

<select name="type" required>
<option value="">📌 جۆر</option>
<option>گروپ</option>
<option>تاک</option>
</select>

<select name="payment" required>
<option value="">💳 پارەدان</option>
<option>FIB</option>
<option>FastPay</option>
<option>Qi Card</option>
</select>

<input type="file" id="file" name="visa">
<img id="preview" class="preview" style="display:none">

<textarea name="note" placeholder="📝 تێبینی"></textarea>

<button>ناردن</button>

</form>

<div id="msg"></div>

</div>

<div class="footer">© Siwak</div>

</div>

<script>
// CLOCK
setInterval(()=>{
  document.getElementById("clock").innerHTML =
    new Date().toLocaleTimeString();
},1000);

// HIJRI
let h = new HijriDate();
document.getElementById("hijri").innerHTML = h.toString();

// IMAGE PREVIEW
document.getElementById("file").onchange = e=>{
  const file = e.target.files[0];
  const img = document.getElementById("preview");
  img.src = URL.createObjectURL(file);
  img.style.display="block";
};

// FORM
const form = document.getElementById("form");
const msg = document.getElementById("msg");

form.addEventListener("submit", async (e)=>{
 e.preventDefault();

 const res = await fetch(form.action,{
   method:"POST",
   body:new FormData(form),
   headers:{'Accept':'application/json'}
 });

 if(res.ok){
   msg.innerHTML="✅ نێردرا بەسەرکەوتوویی";
   form.reset();
   document.getElementById("preview").style.display="none";
 }else{
   msg.innerHTML="❌ هەڵەیەک هەیە";
 }
});
</script>

</body>
</html>
