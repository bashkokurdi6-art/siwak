<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siwak Ultra Clean</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Noto Sans Arabic', sans-serif;
}
</style>

</head>

<body class="bg-gray-100 text-right">

<!-- NAVBAR -->
<header class="bg-[#0b3d2e] text-white px-6 py-4 flex justify-between items-center">

  <div class="flex items-center gap-2">
    <span class="text-xl">🕌</span>
    <h1 class="font-bold">سیواک</h1>
  </div>

  <nav class="hidden md:flex gap-6">
    <a href="#" class="hover:text-yellow-300">سەرەکی</a>
    <a href="#" class="hover:text-yellow-300">دەربارە</a>
    <a href="#" class="hover:text-yellow-300">خزمەتگوزاری</a>
  </nav>

  <button onclick="toggleMenu()" class="md:hidden text-2xl">☰</button>

</header>

<!-- MOBILE MENU -->
<div id="menu" class="hidden bg-[#0b3d2e] text-white p-4 space-y-2 md:hidden">
  <a href="#">سەرەکی</a>
  <a href="#">دەربارە</a>
  <a href="#">خزمەتگوزاری</a>
</div>

<!-- HERO -->
<section class="relative h-[400px]">

  <img src="images/hero.jpg" class="w-full h-full object-cover">

  <div class="absolute inset-0 bg-black/50 flex items-center">
    <div class="p-6 text-white">
      <h2 class="text-3xl font-bold mb-2">سیواک</h2>
      <p class="mb-4">حجزى ڕۆژوى شریف بە ئاسانترین شێوە</p>

      <button class="bg-[#0b3d2e] hover:bg-green-800 transition px-5 py-2 rounded">
        دەستپێبکە
      </button>
    </div>
  </div>

</section>

<!-- FEATURES -->
<section class="bg-[#0b3d2e] text-white grid grid-cols-2 md:grid-cols-4 text-center py-6 gap-4">
  <div>✔ پاراستن</div>
  <div>⏱ 24 کاتژمێر</div>
  <div>🏨 هوتێل</div>
  <div>😊 خزمەتگوزاری</div>
</section>

<!-- CONTENT -->
<section class="p-6 grid md:grid-cols-2 gap-6">

  <!-- FORM -->
  <div class="bg-white p-5 rounded shadow space-y-3">

    <h3 class="font-bold">فۆرمی حجز</h3>

    <input required class="border p-2 w-full rounded" placeholder="ناو">
    <input required class="border p-2 w-full rounded" placeholder="مۆبایل">
    <input class="border p-2 w-full rounded" placeholder="پاسپۆرت">

    <input type="date" class="border p-2 w-full rounded">

    <button class="bg-[#0b3d2e] hover:bg-green-800 transition text-white w-full py-2 rounded">
      ناردن
    </button>

  </div>

  <!-- INFO -->
  <div class="bg-white p-5 rounded shadow">

    <h3 class="font-bold mb-3">دەربارە</h3>

    <img src="images/info.jpg" class="rounded mb-3">

    <p class="text-gray-600">
      زانیاری دەربارەی ڕۆژوی شریف و خزمەتگوزاری...
    </p>

  </div>

</section>

<!-- FOOTER -->
<footer class="bg-[#0b3d2e] text-white text-center p-4">
  © 2026 Siwak
</footer>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("hidden");
}
</script>

</body>
</html>
