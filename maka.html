<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIWAK</title>

<style>
body{margin:0;font-family:sans-serif;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:white;}
.header{text-align:center;padding:25px;font-size:26px;font-weight:bold;}
.section{ margin:20px; }
.title{ margin:15px 0;font-size:20px;}
.hero{width:100%;height:200px;border-radius:25px;object-fit:cover;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
.card{background:rgba(255,255,255,0.1);backdrop-filter:blur(15px);border-radius:20px;padding:12px;cursor:pointer;transition:0.3s;}
.card:hover{transform:scale(1.05);}
.box{background:rgba(255,255,255,0.25);padding:8px;margin:4px 0;border-radius:10px;}
.payment{margin:30px 20px;padding:20px;border-radius:25px;background:rgba(255,255,255,0.08);}
.selectedBox{background:rgba(255,255,255,0.15);padding:12px;border-radius:12px;margin-bottom:10px;}
input,textarea{width:100%;padding:12px;margin:6px 0;border-radius:12px;border:none;}
.payRow{display:flex;gap:10px;margin:15px 0;}
.payCard{flex:1;padding:14px;border-radius:15px;text-align:center;cursor:pointer;background:rgba(255,255,255,0.1);}
.payCard.active{background:linear-gradient(90deg,#198754,#20c997);}
.uploadBox{border:2px dashed rgba(255,255,255,0.3);padding:20px;border-radius:15px;text-align:center;}
.previewImg{width:100%;margin-top:10px;border-radius:12px;display:none;}
.btn{background:#00ffcc;color:black;padding:14px;border-radius:12px;text-align:center;cursor:pointer;}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#00cc99;color:black;padding:12px 20px;border-radius:10px;display:none;}
</style>
</head>

<body>

<div class="header">SIWAK 🕌</div>

<div class="section">
<div class="title">هۆتێلە نزیک حەرەم</div>
<img class="hero" src="https://images.unsplash.com/photo-1564769625905-50e93615e769">
<div id="hotels"></div>
</div>

<div class="payment">

<h2>💳 پارەدان</h2>

<div class="selectedBox">
🏨 <b id="selectedHotel">هیچ هەڵنەبژێردراوە</b>
</div>

<input id="username" placeholder="👤 ناوی سیانی">
<input id="phone" placeholder="📱 ژمارەی مۆبایل">

<div class="payRow">
<div class="payCard" onclick="selectPay(this,'FastPay')">FastPay</div>
<div class="payCard" onclick="selectPay(this,'FIB')">FIB</div>
<div class="payCard" onclick="selectPay(this,'QiCard')">Qi Card</div>
</div>

<div class="uploadBox">
📸 وێنە بنێرە
<input type="file" id="fileInput" onchange="previewImage()">
<img id="preview" class="previewImg">
</div>

<textarea id="note" placeholder="✍️ تێبینی..."></textarea>

<div class="btn" id="sendBtn" onclick="sendData()">✔️ پارەدان بکە</div>

</div>

<div id="toast"></div>

<script>

let html='<div class="grid">';
for(let i=1;i<=10;i++){
html+=`
<div class="card" onclick="selectHotel('Hotel ${i}',${100+i})">
<div class="box">🏨 Hotel ${i}</div>
<div class="box">⭐ 4.${i}</div>
<div class="box">💰 $${100+i}</div>
</div>`;
}
html+='</div>';
document.getElementById("hotels").innerHTML=html;

let selected="";
function selectHotel(name,price){
selected=name+" - $"+price;
document.getElementById("selectedHotel").innerText=selected;
}

let selectedPay="";
function selectPay(el,method){
document.querySelectorAll(".payCard").forEach(c=>c.classList.remove("active"));
el.classList.add("active");
selectedPay=method;
}

function showToast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",3000);
}

function previewImage(){
let file=document.getElementById("fileInput").files[0];
let img=document.getElementById("preview");
if(file){
let reader=new FileReader();
reader.onload=e=>{
img.src=e.target.result;
img.style.display="block";
};
reader.readAsDataURL(file);
}
}

async function sendData(){

let btn=document.getElementById("sendBtn");
btn.innerText="⏳ چاوەڕێ بکە...";
btn.style.pointerEvents="none";

let name=document.getElementById("username").value.trim();
let phone=document.getElementById("phone").value.trim();
let file=document.getElementById("fileInput").files[0];

if(!selected){showToast("هۆتێل هەڵبژێرە");resetBtn();return;}
if(name.length<3){showToast("ناو هەڵەیە");resetBtn();return;}
if(!/^[0-9]{10,}$/.test(phone)){showToast("ژمارە هەڵەیە");resetBtn();return;}
if(!selectedPay){showToast("پارەدان هەڵبژێرە");resetBtn();return;}
if(!file){showToast("وێنە دانە");resetBtn();return;}

let formData=new FormData();
formData.append("hotel",selected);
formData.append("name",name);
formData.append("phone",phone);
formData.append("payment",selectedPay);
formData.append("note",document.getElementById("note").value);
formData.append("file",file);

try{
let res=await fetch("https://formspree.io/f/mdayqnoj",{
method:"POST",
body:formData
});

if(res.status === 200 || res.status === 302){
showToast("✅ داواکاری نێردرا");
}else{
let err = await res.text();
console.log("Formspree error:", err);
showToast("❌ هەڵەیە");
}
}catch(e){
console.log(e);
showToast("❌ کێشەی نێت");
}

resetBtn();
}

function resetBtn(){
let btn=document.getElementById("sendBtn");
btn.innerText="✔️ پارەدان بکە";
btn.style.pointerEvents="auto";
}

</script>

</body>
</html>
