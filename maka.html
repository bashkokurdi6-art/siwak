<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIWAK</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* header */
.header{
  text-align:center;
  padding:25px;
  font-size:26px;
  font-weight:bold;
}

/* section */
.section{ margin:20px; }

.title{
  margin:15px 0;
  font-size:20px;
}

/* image */
.hero{
  width:100%;
  height:200px;
  border-radius:25px;
  object-fit:cover;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

/* card */
.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:12px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  background:rgba(255,255,255,0.2);
}

.box{
  background:rgba(255,255,255,0.25);
  padding:8px;
  margin:4px 0;
  border-radius:10px;
}

/* 💳 PAYMENT (ثابت لە ژێرەوە) */
.payment{
  margin:30px 20px;
  background:white;
  color:black;
  padding:20px;
  border-radius:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* pay cards */
.payRow{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.payCard{
  flex:1;
  background:#f1f1f1;
  padding:12px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.payCard:hover{
  background:#198754;
  color:white;
}

/* inputs */
input,textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

/* upload */
.upload{
  border:2px dashed #ccc;
  padding:15px;
  text-align:center;
  border-radius:12px;
}

/* button */
.btn{
  background:linear-gradient(90deg,#198754,#20c997);
  color:white;
  padding:14px;
  text-align:center;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="header">SIWAK 🕌</div>

<!-- 🏨 HOTELS -->
<div class="section">
<div class="title">هۆتێلە نزیک حەرەم</div>
<img class="hero" src="https://images.unsplash.com/photo-1564769625905-50e93615e769">

<div id="hotels"></div>
</div>

<!-- 💳 PAYMENT -->
<div class="payment" id="paymentSection">

<h3>💳 پارەدان</h3>

<div style="background:#f1f1f1;padding:10px;border-radius:10px;">
<b>هۆتێلی هەڵبژێردرا:</b>
<div id="selectedHotel">هیچ هۆتێلێک هەڵنەبژێردراوە</div>
</div>

<div class="payRow">
<div class="payCard" onclick="selectPay('FastPay')">FastPay</div>
<div class="payCard" onclick="selectPay('FIB')">FIB</div>
<div class="payCard" onclick="selectPay('QiCard')">Qi Card</div>
</div>

<div id="account"></div>

<div class="upload">
📸 وێنەی پارەناردنەکەت بنێرە
<input type="file">
</div>

<textarea id="note" placeholder="تێبینی..."></textarea>

<div class="btn" onclick="sendData()">✔️ پارەدان بکە</div>

</div>

<script>

// create hotels
let html='<div class="grid">';
for(let i=1;i<=10;i++){
html+=`
<div class="card" onclick="selectHotel('Hotel ${i}',${100+i})">
<div class="box">🏨 Hotel ${i}</div>
<div class="box">⭐ 4.${i}</div>
<div class="box">💰 $${100+i}</div>
<div class="box">📍 Makkah</div>
</div>`;
}
html+='</div>';
document.getElementById("hotels").innerHTML=html;

// select hotel + scroll
let selected="";
function selectHotel(name,price){
selected=name+" - $"+price;
document.getElementById("selectedHotel").innerText=selected;

// smooth scroll بۆ پارەدان
document.getElementById("paymentSection")
.scrollIntoView({behavior:"smooth"});
}

// payment
function selectPay(method){
const acc={
FastPay:"0770 xxx xxx",
FIB:"0750 xxx xxx",
QiCard:"0780 xxx xxx"
};

document.getElementById("account").innerText=
"ژمارە: "+acc[method];
}

// send
function sendData(){
fetch("https://formspree.io/f/mgorjdjr",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
hotel:selected,
note:document.getElementById("note").value
})
}).then(()=>{
alert("ناردرا ✔️");
});
}

</script>

</body>
</html>
