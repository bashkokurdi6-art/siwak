<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIWAK</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.header{
  text-align:center;
  padding:25px;
  font-size:26px;
  font-weight:bold;
}

.section{ margin:20px; }

.title{
  margin:15px 0;
  font-size:20px;
}

.hero{
  width:100%;
  height:200px;
  border-radius:25px;
  object-fit:cover;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

/* hotel card */
.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:12px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  background:rgba(255,255,255,0.2);
}

.box{
  background:rgba(255,255,255,0.25);
  padding:8px;
  margin:4px 0;
  border-radius:10px;
}

/* 💳 payment */
.payment{
  margin:30px 20px;
  background:white;
  color:black;
  padding:20px;
  border-radius:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.selectedBox{
  background:#f1f1f1;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
}

.payRow{
  display:flex;
  gap:10px;
  margin:15px 0;
}

.payCard{
  flex:1;
  background:white;
  padding:14px;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
  font-weight:bold;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.payCard.active{
  background:#198754;
  color:white;
  transform:scale(1.05);
}

.accountBox{
  background:#e9f7ef;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  display:none;
  font-weight:bold;
}

.uploadBox{
  border:2px dashed #ccc;
  padding:20px;
  border-radius:15px;
  text-align:center;
  margin:10px 0;
}

/* inputs */
input,textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

/* button */
.btn{
  background:linear-gradient(90deg,#198754,#20c997);
  color:white;
  padding:14px;
  text-align:center;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="header">SIWAK 🕌</div>

<!-- 🏨 HOTELS -->
<div class="section">
<div class="title">هۆتێلە نزیک حەرەم</div>

<img class="hero" src="https://images.unsplash.com/photo-1564769625905-50e93615e769">

<div id="hotels"></div>
</div>

<!-- 💳 PAYMENT -->
<div class="payment" id="paymentSection">

<h2>💳 پارەدان</h2>

<div class="selectedBox">
<span>🏨 هۆتێل:</span>
<b id="selectedHotel">هیچ هەڵنەبژێردراوە</b>
</div>

<div class="payRow">
<div class="payCard" onclick="selectPay(this,'FastPay')">FastPay</div>
<div class="payCard" onclick="selectPay(this,'FIB')">FIB</div>
<div class="payCard" onclick="selectPay(this,'QiCard')">Qi Card</div>
</div>

<div id="accountBox" class="accountBox"></div>

<div class="uploadBox">
📸 وێنەی پارەناردنەکەت بنێرە
<input type="file">
</div>

<textarea id="note" placeholder="✍️ تێبینی..."></textarea>

<div class="btn" onclick="sendData()">✔️ پارەدان بکە</div>

</div>

<script>

// create hotels
let html='<div class="grid">';
for(let i=1;i<=10;i++){
html+=`
<div class="card" onclick="selectHotel('Hotel ${i}',${100+i})">
<div class="box">🏨 Hotel ${i}</div>
<div class="box">⭐ 4.${i}</div>
<div class="box">💰 $${100+i}</div>
<div class="box">📍 Makkah</div>
</div>`;
}
html+='</div>';
document.getElementById("hotels").innerHTML=html;

// select hotel
let selected="";
function selectHotel(name,price){
selected=name+" - $"+price;
document.getElementById("selectedHotel").innerText=selected;

document.getElementById("paymentSection")
.scrollIntoView({behavior:"smooth"});
}

// select payment
let selectedPay="";
function selectPay(el,method){

document.querySelectorAll(".payCard")
.forEach(c=>c.classList.remove("active"));

el.classList.add("active");

selectedPay=method;

const acc={
FastPay:"0770 xxx xxx",
FIB:"0750 xxx xxx",
QiCard:"0780 xxx xxx"
};

let box=document.getElementById("accountBox");
box.style.display="block";
box.innerText="ژمارە: "+acc[method];
}

// send to Formspree
function sendData(){

fetch("https://formspree.io/f/mgorjdjr",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
hotel:selected,
payment:selectedPay,
note:document.getElementById("note").value
})
}).then(()=>{
alert("ناردرا ✔️");
});

}

</script>

</body>
</html>
