<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIWAK</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.header{
  text-align:center;
  padding:25px;
  font-size:26px;
  font-weight:bold;
}

.section{ margin:20px; }

.title{
  margin:15px 0;
  font-size:20px;
}

.hero{
  width:100%;
  height:200px;
  border-radius:25px;
  object-fit:cover;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:12px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  background:rgba(255,255,255,0.2);
}

.box{
  background:rgba(255,255,255,0.25);
  padding:8px;
  margin:4px 0;
  border-radius:10px;
}

.payment{
  margin:30px 20px;
  background:white;
  color:black;
  padding:20px;
  border-radius:25px;
}

.selectedBox{
  background:#f1f1f1;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
}

.payRow{
  display:flex;
  gap:10px;
  margin:15px 0;
}

.payCard{
  flex:1;
  background:white;
  padding:14px;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
}

.payCard.active{
  background:#198754;
  color:white;
  transform:scale(1.05);
}

.accountBox{
  background:#e9f7ef;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  display:none;
}

.uploadBox{
  border:2px dashed #ccc;
  padding:20px;
  border-radius:15px;
  text-align:center;
  margin:10px 0;
}

.previewImg{
  width:100%;
  margin-top:10px;
  border-radius:12px;
  display:none;
}

input,textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

.btn{
  background:linear-gradient(90deg,#198754,#20c997);
  color:white;
  padding:14px;
  text-align:center;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  margin-top:10px;
}

.backBtn{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#198754;
  color:white;
  padding:12px 15px;
  border-radius:50px;
  cursor:pointer;
}

#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#198754;
color:white;
padding:14px 25px;
border-radius:12px;
display:none;
}
</style>

</head>

<body>

<div class="header">SIWAK 🕌</div>

<div class="section">
<div class="title">هۆتێلە نزیک حەرەم</div>

<img class="hero" src="https://images.unsplash.com/photo-1564769625905-50e93615e769">

<div id="hotels"></div>
</div>

<div class="payment" id="paymentSection">

<h2>💳 پارەدان</h2>

<div class="selectedBox">
<span>🏨 هۆتێل:</span>
<b id="selectedHotel">هیچ هەڵنەبژێردراوە</b>
</div>

<div class="payRow">
<div class="payCard" onclick="selectPay(this,'FastPay')">FastPay</div>
<div class="payCard" onclick="selectPay(this,'FIB')">FIB</div>
<div class="payCard" onclick="selectPay(this,'QiCard')">Qi Card</div>
</div>

<div id="accountBox" class="accountBox"></div>

<div class="uploadBox">
📸 وێنەی پارەناردنەکەت بنێرە
<input type="file" id="fileInput" onchange="previewImage()">
<img id="preview" class="previewImg">
</div>

<textarea id="note" placeholder="✍️ تێبینی..."></textarea>

<div class="btn" id="sendBtn" onclick="sendData()">✔️ پارەدان بکە</div>

</div>

<div class="backBtn" onclick="goBack()">🔙</div>

<div id="toast"></div>

<script>

// hotels
let html='<div class="grid">';
for(let i=1;i<=10;i++){
html+=`
<div class="card" onclick="selectHotel('Hotel ${i}',${100+i})">
<div class="box">🏨 Hotel ${i}</div>
<div class="box">⭐ 4.${i}</div>
<div class="box">💰 $${100+i}</div>
<div class="box">📍 Makkah</div>
</div>`;
}
html+='</div>';
document.getElementById("hotels").innerHTML=html;

// select + scroll
let selected="";
function selectHotel(name,price){
selected=name+" - $"+price;
document.getElementById("selectedHotel").innerText=selected;
document.getElementById("paymentSection").scrollIntoView({behavior:"smooth"});
}

// payment
let selectedPay="";
function selectPay(el,method){
document.querySelectorAll(".payCard").forEach(c=>c.classList.remove("active"));
el.classList.add("active");
selectedPay=method;

const acc={
FastPay:"0770 xxx xxx",
FIB:"0750 xxx xxx",
QiCard:"0780 xxx xxx"
};

let box=document.getElementById("accountBox");
box.style.display="block";
box.innerText="ژمارە: "+acc[method];
}

// preview
function previewImage(){
let file=document.getElementById("fileInput").files[0];
let img=document.getElementById("preview");

if(file){
let reader=new FileReader();
reader.onload=e=>{
img.src=e.target.result;
img.style.display="block";
};
reader.readAsDataURL(file);
}
}

// toast
function showToast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",3000);
}

// send
function sendData(){

let btn=document.getElementById("sendBtn");
btn.innerText="⏳ چاوەڕێ بکە...";
btn.style.pointerEvents="none";

let file=document.getElementById("fileInput").files[0];

let formData=new FormData();
formData.append("hotel",selected);
formData.append("payment",selectedPay);
formData.append("note",document.getElementById("note").value);
if(file) formData.append("file",file);

fetch("https://formspree.io/f/mdayqnoj",{
method:"POST",
body:formData,
headers:{'Accept':'application/json'}
})
.then(res=>{
if(res.ok){
showToast("✅ نێردرا بە سەرکەوتوویی");
}else{
showToast("❌ هەڵەیە");
}
})
.catch(()=>showToast("❌ کێشەی نێت"));

btn.innerText="✔️ پارەدان بکە";
btn.style.pointerEvents="auto";
}

// back
function goBack(){
window.history.back();
}

</script>

</body>
</html>
