<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIWAK</title>

<style>
body {margin:0; font-family:sans-serif; background:#f5f5f5;}

.header {
  background:#198754;
  color:white;
  text-align:center;
  padding:15px;
  font-size:20px;
}

.section-title {
  padding:10px;
  font-weight:bold;
  font-size:18px;
}

/* hotel image */
.hero {
  width:100%;
  height:180px;
  object-fit:cover;
}

/* dashboard */
.card {
  background:white;
  margin:10px;
  padding:10px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:5px;
}

.box {
  background:#eee;
  padding:8px;
  border-radius:10px;
  font-size:14px;
}

/* payment */
.payment-box {
  background:white;
  margin:10px;
  padding:10px;
  border-radius:15px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid #ccc;
}
</style>

</head>

<body>

<div class="header">SIWAK 🕌</div>

<!-- 🕌 SECTION 1 -->
<div class="section-title">هۆتێلە نزیک حەرەم</div>
<img class="hero" src="https://images.unsplash.com/photo-1564769625905-50e93615e769">

<!-- 10 cards -->
<div id="haram-hotels"></div>

<!-- 🏨 SECTION 2 -->
<div class="section-title">هۆتێلە ناوەندەکان</div>
<img class="hero" src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b">
<div id="center-hotels"></div>

<!-- 🏨 SECTION 3 -->
<div class="section-title">محبس جن</div>
<img class="hero" src="https://images.unsplash.com/photo-1590490360182-c33d57733427">
<div id="mahbas-hotels"></div>

<!-- 💳 PAYMENT -->
<div class="section-title">پارەدان</div>

<div class="payment-box">

<select id="paymentMethod">
  <option value="">هەڵبژاردن</option>
  <option value="fastpay">FastPay</option>
  <option value="fib">FIB</option>
  <option value="qi">Qi Card</option>
</select>

<div id="account"></div>

<input type="file">
<p>وێنەی پارەناردنەکەت بنێرە</p>

<textarea placeholder="تێبینی..."></textarea>

</div>

<!-- 🔙 BACK -->
<div class="payment-box">
<a href="https://github.com">گەڕانەوە</a>
</div>

<script>

// generate 10 dashboards
function createCards(id){
  let container = document.getElementById(id);
  for(let i=1;i<=10;i++){
    container.innerHTML += `
    <div class="card">
      <div class="grid">
        <div class="box">ناو: Hotel ${i}</div>
        <div class="box">⭐ 4.${i}</div>
        <div class="box">$${100+i}</div>
        <div class="box">مەکە</div>
      </div>
    </div>`;
  }
}

createCards("haram-hotels");
createCards("center-hotels");
createCards("mahbas-hotels");

// payment numbers (admin editable later)
const accounts = {
  fastpay: "0770 000 0000",
  fib: "0750 000 0000",
  qi: "0780 000 0000"
};

document.getElementById("paymentMethod").onchange = function(){
  document.getElementById("account").innerHTML = 
  "ژمارە: " + accounts[this.value];
};

</script>

</body>
</html>
